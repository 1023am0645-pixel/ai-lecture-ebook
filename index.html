<meta name="twitter:description" content="AI 활용 콘텐츠 제작 교육 전자책">
<style>
/* ============ 디자인 시스템 ============ */
:root {
  /* Dark (default) */
  --bg: #0c0c0f;
  --bg-soft: #131318;
  --bar: rgba(14, 14, 18, .92);
  --paper: #131318;
  --paper-left: #15151a;
  --ink: #ececea;
  --ink-soft: #bcbcb8;
  --muted: #7a7a82;
  --dim: #4a4a52;
  --line: #25252b;
  --line-soft: #1d1d22;
  --accent: #d4a843;      /* warm amber - 강조 */
  --accent-soft: #b8922e;
  --speech: #7fccc5;     /* teal - 대화체 */
  --speech-dim: #4fa8a0;
  --rule: #2a2a31;
  --shadow: 0 30px 80px rgba(0,0,0,.55), 0 2px 10px rgba(0,0,0,.4);
  --hilite-bg: rgba(255,255,255,.025);
  --scale: 1;
}
body.light {
  --bg: #f1eee8;
  --bg-soft: #fafaf7;
  --bar: rgba(250, 248, 243, .95);
  --paper: #fbfaf6;
  --paper-left: #fdfcf9;
  --ink: #15151a;
  --ink-soft: #2c2c33;
  --muted: #6b6b73;
  --dim: #a7a7ad;
  --line: #dcd9d1;
  --line-soft: #e6e3db;
  --accent: #a06518;      /* warm brown */
  --accent-soft: #7a4c10;
  --speech: #1e7a6e;     /* teal */
  --speech-dim: #155f57;
  --rule: #c8c4ba;
  --shadow: 0 30px 70px rgba(60,50,30,.16), 0 2px 8px rgba(60,50,30,.08);
  --hilite-bg: rgba(0,0,0,.025);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  overflow: hidden;
  color: var(--ink);
  background: var(--bg);
  font-family: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont,
    'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-feature-settings: 'ss01', 'cv01', 'tnum';
  word-break: keep-all;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ 상단바 ============ */
.topbar {
  height: 64px;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) minmax(140px, 300px) 78px auto;
  align-items: center;
  gap: 16px;
  padding: 8px 22px;
  color: var(--ink);
  background: var(--bar);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  letter-spacing: .005em;
}
.icon-btn {
  min-width: 38px;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: transparent;
  color: inherit;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.icon-btn:hover { background: var(--hilite-bg); border-color: var(--muted); }
.icon-btn:disabled {
  cursor: not-allowed;
  opacity: .45;
}
.voice-btn {
  min-width: 52px;
  padding: 0 10px;
  font-size: .82rem;
  font-weight: 700;
}
.voice-btn.is-reading {
  color: #0c0c0f;
  background: var(--accent);
  border-color: var(--accent);
}
.brand {
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--ink-soft);
}
.progress-track {
  height: 2px;
  background: var(--line);
  overflow: hidden;
  border-radius: 1px;
}
.progress-fill {
  height: 100%;
  width: 0;
  background: var(--ink);
  transition: width .3s;
}
.page-count {
  text-align: center;
  font-size: .82rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: .04em;
}
.tools { display: flex; gap: 8px; justify-content: flex-end; }

/* ============ 무대 / 책 ============ */
.stage {
  position: relative;
  height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 88px 44px;
}
.book {
  position: relative;
  width: min(1240px, 100%);
  height: min(800px, 100%);
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-radius: 4px;
  box-shadow: var(--shadow);
  overflow: hidden;
  background: var(--paper);
}
.book::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 32px;
  transform: translateX(-50%);
  pointer-events: none;
  background: linear-gradient(90deg, rgba(0,0,0,.08), rgba(255,255,255,.04) 45%, rgba(0,0,0,.10));
  mix-blend-mode: multiply;
}
body.light .book::after {
  background: linear-gradient(90deg, rgba(0,0,0,.06), rgba(255,255,255,.18) 45%, rgba(0,0,0,.08));
}

/* ============ 페이지 ============ */
.page {
  position: relative;
  min-width: 0;
  padding: clamp(38px, 4.5vw, 70px) clamp(40px, 5vw, 78px);
  background: var(--paper);
  overflow: hidden;
}
.page.left { background: var(--paper-left); }
.page[data-kind="image-cover"] {
  padding: 0;
  background: #000;
}
.page-inner {
  height: 100%;
  overflow: auto;
  padding: 2px 4px 30px;
  scrollbar-width: none;
}
.page-inner::-webkit-scrollbar { display: none; }

/* ============ 타이포 ============ */
.page p, .page li, .page td, .page th {
  font-size: calc(.965rem * var(--scale));
  line-height: 1.84;
  color: var(--ink-soft);
  letter-spacing: -.003em;
}
.page p { margin: 0 0 1.18em; }
.page strong { color: var(--ink); font-weight: 700; }

/* 챕터 마커 / 타이틀 */
.ch-marker {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 28px;
}
.ch-marker .ch-of { color: var(--speech-dim); margin-left: 4px; }
.ch-marker.small { font-size: calc(.68rem * var(--scale)); margin-bottom: 18px; }

.ch-title {
  margin: 0;
  font-size: calc(2rem * var(--scale));
  line-height: 1.28;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -.018em;
}
.ch-sub {
  margin: 12px 0 0;
  font-size: calc(1rem * var(--scale));
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0;
}
.rule {
  margin: 32px 0 30px;
  border: 0;
  height: 1px;
  background: var(--rule);
}
.rule.small {
  margin: 20px 0 24px;
  background: var(--line);
  opacity: .8;
}

.page h3 {
  margin: 36px 0 16px;
  color: var(--ink);
  font-size: calc(1.05rem * var(--scale));
  font-weight: 700;
  letter-spacing: -.005em;
}
.page h3::before {
  content: none;
}

/* ============ 핵심 문장 (lede) ============ */
.lede {
  position: relative;
  margin: 0 0 1.4em !important;
  padding-left: 18px;
  font-size: calc(1.05rem * var(--scale)) !important;
  font-weight: 700;
  color: var(--accent) !important;
  line-height: 1.62 !important;
  letter-spacing: -.005em;
  border-left: 3px solid var(--accent);
}

/* 챕터 마무리 문장 */
.close-stmt {
  margin: 1.6em 0 0 !important;
  padding-top: 1.2em;
  border-top: 1px solid var(--line);
  font-size: calc(.985rem * var(--scale)) !important;
  color: var(--ink) !important;
  font-weight: 600;
  line-height: 1.78 !important;
  letter-spacing: -.003em;
}

/* ============ 인용 ============ */
.quote {
  font-style: italic;
  font-weight: 600;
  color: var(--accent);
  font-feature-settings: 'kern';
}
.text-bold {
  font-style: normal;
  font-weight: 700;
  color: inherit;
}

blockquote.pull {
  margin: 22px 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--speech);
  background: transparent;
}
blockquote.pull p {
  font-size: calc(.97rem * var(--scale)) !important;
  font-style: italic;
  color: var(--speech);
  line-height: 1.78 !important;
  margin: 0 0 .5em;
}
blockquote.pull.speech p {
  color: var(--speech);
}
blockquote.pull.speech {
  border-left-color: var(--speech);
}
blockquote.pull p:last-child { margin-bottom: 0; }
blockquote.pull cite {
  display: block;
  margin-top: 10px;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  font-style: normal;
  letter-spacing: .03em;
  color: var(--muted);
}

blockquote.pull-large {
  margin: 28px 0;
  padding: 22px 0 18px 26px;
  border-left: 3px solid var(--accent);
}
blockquote.pull-large p {
  font-size: calc(1.06rem * var(--scale)) !important;
  font-weight: 500;
  font-style: normal;
  color: var(--ink) !important;
  letter-spacing: -.005em;
  line-height: 1.7 !important;
}

blockquote.final-quote {
  margin: 36px 0 20px;
  padding: 28px 30px 24px;
  background: var(--hilite-bg);
  border-left: 4px solid var(--ink);
  border-radius: 0 2px 2px 0;
}
blockquote.final-quote p {
  font-size: calc(1.1rem * var(--scale)) !important;
  line-height: 1.68 !important;
}

/* ============ 리스트 ============ */
.book-list, .check-list, .steps {
  margin: 16px 0 22px;
  padding: 0;
  list-style: none;
}
.check-list li {
  position: relative;
  padding-left: 24px;
  margin: .85em 0;
  line-height: 1.78;
  color: var(--ink-soft);
}
.check-list li::before {
  content: "●";
  position: absolute;
  left: 0;
  top: .05em;
  font-size: .55em;
  color: var(--accent);
  line-height: 2.6;
}
.check-list.compact li { margin: .55em 0; }

.steps {
  counter-reset: step;
  border-top: 1px solid var(--line);
}
.steps > li {
  counter-increment: step;
  position: relative;
  padding: 22px 0 22px 70px;
  border-bottom: 1px solid var(--line);
}
.steps > li::before {
  content: counter(step, decimal-leading-zero);
  position: absolute;
  left: 0;
  top: 22px;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.86rem * var(--scale));
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .04em;
}
.steps .item-head {
  display: block;
  font-size: calc(1.02rem * var(--scale));
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: -.005em;
}
.steps p {
  margin: 0 0 .7em;
  font-size: calc(.94rem * var(--scale)) !important;
  line-height: 1.78 !important;
}
.steps p:last-child { margin-bottom: 0; }

.steps.compact > li {
  padding: 14px 0 14px 60px;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.steps.compact > li::before {
  top: 16px;
}
.steps.compact .item-head {
  display: inline;
  margin: 0;
  min-width: 8em;
}
.steps.compact span {
  font-size: calc(.94rem * var(--scale));
  color: var(--ink-soft);
}

/* ============ 표 ============ */
.table-wrap {
  overflow: auto;
  margin: 16px 0 22px;
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px 14px;
  text-align: left;
  vertical-align: top;
  border-bottom: 1px solid var(--line);
  font-size: calc(.88rem * var(--scale)) !important;
  line-height: 1.62 !important;
}
th {
  color: var(--ink);
  font-weight: 700;
  background: var(--hilite-bg);
  letter-spacing: -.003em;
  border-bottom: 1px solid var(--ink);
}
td { color: var(--ink-soft); }
td.num {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  font-size: calc(1rem * var(--scale)) !important;
}
.compare-table .cmp-label {
  font-weight: 700;
  color: var(--muted);
  width: 22%;
  letter-spacing: -.003em;
}

/* ============ 통계 (chapter 6) ============ */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 24px 0 28px;
}
.stat {
  padding: 22px 16px 18px;
  border: 1px solid var(--line);
  text-align: center;
}
.stat-num {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(2.4rem * var(--scale));
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.015em;
  line-height: 1;
}
.stat-num sup {
  font-size: .5em;
  vertical-align: top;
  margin-left: 2px;
  color: var(--muted);
}
.stat-label {
  margin-top: 8px;
  font-size: calc(.74rem * var(--scale));
  color: var(--muted);
  line-height: 1.45;
  letter-spacing: 0;
}

/* ============ 키워드 태그 (chapter 9) ============ */
.tag-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 14px 0 24px;
}
.tag {
  display: inline-block;
  padding: 6px 14px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  font-size: calc(.82rem * var(--scale));
  color: var(--accent);
  letter-spacing: -.003em;
  background: var(--hilite-bg);
}

/* ============ 인물 카드 (chapter 10) ============ */
.person-card {
  position: relative;
  margin: 22px 0;
  padding: 22px 0 18px 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--line);
}
.person-card + .person-card { margin-top: 28px; }
.person-label {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.7rem * var(--scale));
  letter-spacing: .22em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.person-name {
  font-size: calc(1.18rem * var(--scale));
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
  letter-spacing: -.008em;
}

/* ============ 후기 카드 (chapter 15) ============ */
.review-list {
  margin: 18px 0 0;
  display: grid;
  gap: 1px;
  background: var(--line);
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.review {
  background: var(--paper);
  padding: 18px 4px 18px 78px;
  position: relative;
}
.page.left .review { background: var(--paper-left); }
.review-num {
  position: absolute;
  left: 4px;
  top: 18px;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .12em;
  color: var(--accent-soft);
  font-weight: 600;
}
.review-text {
  margin: 0 !important;
  font-size: calc(.92rem * var(--scale)) !important;
  line-height: 1.7 !important;
  color: var(--ink-soft);
}

/* ============ note-box (프롤로그) ============ */
.note-box {
  margin: 22px 0 0;
  padding: 24px 26px 20px;
  border: 1px solid var(--accent);
  background: var(--hilite-bg);
}
.note-label {
  display: inline-block;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.note-box ul {
  margin: 0;
  padding: 0;
  list-style: none;
}
.note-box li {
  position: relative;
  padding-left: 18px;
  margin: .82em 0;
  font-size: calc(.94rem * var(--scale)) !important;
  line-height: 1.72 !important;
  color: var(--ink-soft);
}
.note-box li::before {
  content: "◆";
  position: absolute;
  left: 0;
  color: var(--accent);
  font-size: .7em;
  top: .18em;
}

/* ============ 이미지 표지 ============ */
.image-cover-page {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  background: #000;
  overflow: hidden;
}
.image-cover-page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ============ 책 표지 (cover) ============ */
.cover-box {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 18px 36px 16px;
}
.cover-meta-top {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}
.cover-meta-label {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .24em;
  color: var(--muted);
  text-transform: uppercase;
}
.cover-meta-dot { color: var(--dim); }
.cover-rule-top, .cover-rule-bottom {
  width: 60px;
  border-top: 1.5px solid var(--dim);
  margin: 0 0 50px;
}
.cover-title {
  margin: 0 0 44px;
  font-size: calc(3.08rem * var(--scale));
  line-height: 1.28;
  font-weight: 800;
  letter-spacing: -.022em;
}
.cover-title-main, .cover-title-subtitle { display: block; }
.cover-title-subtitle {
  margin-top: .42em;
  color: var(--ink-soft);
  font-size: .54em;
  font-weight: 600;
  letter-spacing: .01em;
}
.cover-sub {
  max-width: 28em;
  color: var(--ink-soft) !important;
  font-size: calc(.92rem * var(--scale)) !important;
  line-height: 1.72 !important;
  margin: 0 auto 44px !important;
}
.cover-rule-bottom { margin: 0 0 36px; }
.cover-credit {
  margin-top: auto;
  padding-bottom: 0;
  transform: translateY(10px);
}
.cover-author {
  font-weight: 700;
  color: var(--ink);
  font-size: calc(1.06rem * var(--scale)) !important;
  margin: 0 0 .35em !important;
  letter-spacing: -.005em;
}
.cover-org {
  color: var(--muted) !important;
  font-size: calc(.86rem * var(--scale)) !important;
  margin: 0 0 .9em !important;
  letter-spacing: 0;
}
.cover-date {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  color: var(--muted) !important;
  font-size: calc(.78rem * var(--scale)) !important;
  letter-spacing: .12em;
  margin: 0 !important;
}

/* ============ 프롤로그 ============ */
.prologue-page {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.prologue-kicker {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .26em;
  color: var(--muted);
  text-transform: uppercase;
}
.prologue-title {
  margin: 8px 0 30px;
  font-size: calc(2.2rem * var(--scale)) !important;
  font-weight: 800 !important;
  color: var(--ink) !important;
  letter-spacing: -.018em !important;
  line-height: 1.2 !important;
}
.prologue-meta-block {
  padding: 18px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.prologue-meta-main {
  margin: 0 0 .15em !important;
  font-size: calc(.97rem * var(--scale)) !important;
  font-weight: 600;
  color: var(--ink) !important;
  line-height: 1.55 !important;
}
.prologue-meta-sub {
  margin: .8em 0 .3em !important;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale)) !important;
  letter-spacing: .2em;
  color: var(--muted) !important;
  text-transform: uppercase;
  text-align: center !important;
}
.prologue-meta-date {
  margin: 0 !important;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.78rem * var(--scale)) !important;
  letter-spacing: .12em;
  color: var(--muted) !important;
}
.prologue-copy {
  margin: 0 0 24px !important;
  font-size: calc(.94rem * var(--scale)) !important;
  color: var(--ink-soft) !important;
  line-height: 1.78 !important;
}

/* ============ 목차 ============ */
.toc-page {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.toc-kicker {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .26em;
  color: var(--muted);
  text-transform: uppercase;
  text-align: left;
}
.toc-heading {
  text-align: left;
  margin: 8px 0 18px !important;
  font-size: calc(2.2rem * var(--scale)) !important;
  font-weight: 800 !important;
  color: var(--ink) !important;
  letter-spacing: -.018em !important;
}
.toc-rule {
  border-top: 2px solid var(--ink);
  margin: 0 0 8px;
}
.toc-list {
  flex: 1;
}
.toc-row {
  width: 100%;
  display: grid;
  grid-template-columns: 56px minmax(0, 1fr) 56px;
  gap: 18px;
  align-items: baseline;
  border: 0;
  border-bottom: 1px solid var(--line);
  padding: 18px 0;
  background: transparent;
  color: inherit;
  text-align: left;
  cursor: pointer;
  font: inherit;
  transition: background .15s, padding-left .15s;
}
.toc-row:hover {
  background: var(--hilite-bg);
  padding-left: 6px;
}
.toc-num {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  color: var(--muted);
  font-size: calc(.86rem * var(--scale));
  font-weight: 600;
  letter-spacing: .04em;
}
.toc-text { display: block; min-width: 0; }
.toc-main {
  display: block;
  color: var(--ink);
  font-size: calc(1.04rem * var(--scale));
  line-height: 1.42;
  font-weight: 700;
  letter-spacing: -.005em;
}
.toc-subline {
  display: block;
  color: var(--muted);
  font-size: calc(.85rem * var(--scale));
  line-height: 1.5;
  margin-top: .25em;
  font-weight: 400;
}
.toc-page-num {
  color: var(--muted);
  text-align: right;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.82rem * var(--scale));
}
.toc-hint {
  margin: 18px 0 0 !important;
  color: var(--muted) !important;
  text-align: center !important;
  font-size: calc(.72rem * var(--scale)) !important;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  letter-spacing: .08em;
  line-height: 1.5 !important;
}

/* ============ 판권 ============ */
.colophon-page {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: var(--ink);
}
.colophon-rule {
  width: 80px;
  border-top: 2px solid var(--ink);
}
.colophon-rule.top { margin-bottom: 22px; }
.colophon-rule.bottom { margin-top: 32px; opacity: .5; }
.colophon-kicker {
  margin: 0 0 22px !important;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale)) !important;
  letter-spacing: .28em;
  color: var(--muted) !important;
  text-transform: uppercase;
}
.colophon-page h2 {
  font-size: calc(1.6rem * var(--scale));
  line-height: 1.36;
  margin: 0 0 38px;
  font-weight: 800;
  letter-spacing: -.015em;
}
.colophon-list {
  width: min(360px, 92%);
  margin: 0 auto;
  padding: 14px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  text-align: left;
}
.colophon-list div {
  display: grid;
  grid-template-columns: 6.6em minmax(0, 1fr);
  gap: 14px;
  padding: 7px 0;
  align-items: baseline;
}
.colophon-list dt {
  color: var(--muted);
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: calc(.74rem * var(--scale));
  letter-spacing: .12em;
  text-transform: uppercase;
}
.colophon-list dd {
  margin: 0;
  font-size: calc(.92rem * var(--scale));
  color: var(--ink);
  line-height: 1.55;
}
.colophon-note {
  max-width: 28em;
  margin: 26px auto 0 !important;
  color: var(--muted) !important;
  font-size: calc(.82rem * var(--scale)) !important;
  line-height: 1.7 !important;
  text-align: center !important;
}

/* ============ 페이지 번호 / 컨트롤 ============ */
.page-number {
  position: absolute;
  bottom: 22px;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  color: var(--muted);
  font-size: .76rem;
  letter-spacing: .08em;
}
.page.left .page-number { left: 68px; }
.page.right .page-number { right: 68px; }
.page-toc-return {
  position: absolute;
  top: 26px;
  right: 36px;
  z-index: 4;
  border: 0;
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: .72rem;
  letter-spacing: .14em;
  cursor: pointer;
  text-transform: uppercase;
  transition: color .15s;
}
.page-toc-return:hover { color: var(--ink); }
.scroll-indicator {
  position: absolute;
  top: 16px;
  right: 8px;
  width: 3px;
  height: calc(100% - 60px);
  opacity: 0;
  pointer-events: none;
}
.page.has-scroll .scroll-indicator { opacity: 1; }
.scroll-thumb {
  position: absolute;
  top: 0;
  width: 100%;
  min-height: 42px;
  border-radius: 999px;
  background: var(--muted);
  opacity: .5;
}

/* ============ 네비 버튼 ============ */
.nav {
  position: absolute;
  top: 50%;
  width: 44px;
  height: 44px;
  transform: translateY(-50%);
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink);
  font-size: 1.4rem;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.nav:hover { background: var(--hilite-bg); border-color: var(--muted); }
.nav.prev { left: 24px; }
.nav.next { right: 24px; }

/* ============ 사이드바 ============ */
.sidebar {
  position: fixed;
  inset: 64px auto 0 0;
  width: min(340px, 86vw);
  z-index: 30;
  padding: 24px 22px;
  background: var(--bg-soft);
  color: inherit;
  transform: translateX(-105%);
  transition: transform .24s ease;
  border-right: 1px solid var(--line);
  overflow: auto;
}
.sidebar.open { transform: translateX(0); }
.sidebar h2 {
  margin: 0 0 18px;
  font-size: 1rem;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
}
.side-link {
  display: block;
  width: 100%;
  border: 0;
  border-bottom: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  text-align: left;
  padding: 14px 0;
  cursor: pointer;
  line-height: 1.5;
  font: inherit;
  font-size: .92rem;
  font-weight: 500;
}
.side-link:hover { color: var(--accent-soft); }

/* ============ 모바일 ============ */
@media (max-width: 760px) {
  .topbar {
    height: 56px;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 8px;
    padding: 6px 12px;
  }
  .brand { font-size: .78rem; }
  .progress-track, .page-count { display: none; }
  .tools { gap: 6px; }
  .icon-btn { min-width: 36px; height: 36px; font-size: .92rem; }
  .voice-btn {
    min-width: 46px;
    padding: 0 8px;
    font-size: .76rem;
  }
  .stage {
    height: calc(100vh - 56px);
    padding: 12px 12px 86px;
    padding: 12px 12px calc(82px + env(safe-area-inset-bottom));
  }
  .book {
    height: 100%;
    grid-template-columns: 1fr;
    border-radius: 6px;
  }
  .book::after { display: none; }
  .page {
    display: none;
    padding: 26px 22px 44px;
  }
  .page.mobile-active { display: block; }
  /* 모바일 이미지 표지: 회전 없이 그냥 contain */
  .page[data-kind="image-cover"].mobile-active {
    padding: 0;
    background: #000;
  }
  .page[data-kind="image-cover"] .image-cover-page img {
    transform: none;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .page-inner {
    overflow: auto;
    padding-bottom: 76px;
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
  }

  .ch-title { font-size: calc(1.5rem * var(--scale)); }
  .ch-marker { margin-bottom: 18px; }
  .page h3 { margin: 28px 0 12px; }
  .page p, .page li, .page td, .page th {
    font-size: calc(.92rem * var(--scale));
    line-height: 1.78;
  }
  .lede { font-size: calc(.98rem * var(--scale)) !important; padding-left: 14px; }

  blockquote.pull, blockquote.pull-large { padding-left: 16px; }
  blockquote.pull-large p { font-size: calc(.98rem * var(--scale)) !important; }
  blockquote.final-quote { padding: 22px 18px 18px; }

  .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { padding: 16px 8px 12px; }
  .stat-num { font-size: calc(1.7rem * var(--scale)); }
  .stat-label { font-size: calc(.66rem * var(--scale)); }

  .steps > li { padding: 18px 0 18px 56px; }
  .steps > li::before { top: 18px; }
  .steps.compact > li {
    flex-wrap: wrap;
    padding: 12px 0 12px 50px;
  }

  .cover-title { font-size: calc(1.76rem * var(--scale)); }
  .cover-title-subtitle { font-size: .56em; }
  .cover-sub { font-size: calc(.85rem * var(--scale)) !important; }
  .cover-box { padding: 28px 20px 22px; }

  .prologue-title { font-size: calc(1.62rem * var(--scale)) !important; }
  .toc-heading {
    margin: 6px 0 14px !important;
    font-size: calc(1.58rem * var(--scale)) !important;
  }
  .toc-rule { margin-bottom: 4px; }
  .toc-row {
    grid-template-columns: 40px minmax(0, 1fr) 38px;
    gap: 10px;
    padding: 11px 0;
  }
  .toc-main {
    font-size: calc(.95rem * var(--scale));
    line-height: 1.34;
  }
  .toc-subline {
    font-size: calc(.78rem * var(--scale));
    line-height: 1.34;
    margin-top: .18em;
  }
  .toc-hint { margin-top: 8px !important; }

  .colophon-page h2 { font-size: calc(1.3rem * var(--scale)); }
  .colophon-list { width: 100%; }

  .review { padding: 16px 4px 14px 66px; }
  .review-num { left: 4px; }

  .nav {
    position: fixed;
    z-index: 45;
    top: auto;
    bottom: 18px;
    bottom: calc(14px + env(safe-area-inset-bottom));
    transform: none;
    width: 44px;
    height: 44px;
    font-size: 1.2rem;
    background: var(--bg-soft);
    box-shadow: 0 10px 28px rgba(0, 0, 0, .28);
  }
  .nav.prev { left: calc(50% - 58px); }
  .nav.next { right: calc(50% - 58px); }
  .page-number { right: 22px !important; left: auto !important; bottom: 16px; font-size: .7rem; }
  .page-toc-return { top: 14px; right: 16px; font-size: .68rem; }
}

내부 브랜드 강사로 확장될 수 있음을 보여줬다.</li>\n    </ul>\n  </aside>\n</section>\n"},{"kind":"toc","title":"목차","html":"\n<div class='toc-page'>\n  <div class='toc-kicker'>TABLE OF CONTENTS</div>\n  <h2 class='toc-heading'>목차</h2>\n  <div class='toc-rule'></div>\n  <div class='toc-list'>\n    \n<button class='toc-row' data-goto='chapter-01-강의의-정체성-AI-강의가-아니라-브랜드형-교육'>\n  <span class='toc-num'>01</span>\n  <span class='toc-text'>\n    <span class='toc-main'>강의의 정체성</span>\n    <span class='toc-subline'>AI 강의가 아니라 브랜드형 교육 경험</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-02-강의의-전체-흐름-도입부터-마무리까지-이어진-경'>\n  <span class='toc-num'>02</span>\n  <span class='toc-text'>\n    <span class='toc-main'>강의의 전체 흐름</span>\n    <span class='toc-subline'>도입부터 마무리까지 이어진 경험 설계</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-03-도입부-10분의-가치-낭비가-아니라-신뢰-구축-'>\n  <span class='toc-num'>03</span>\n  <span class='toc-text'>\n    <span class='toc-main'>도입부 10분의 가치</span>\n    <span class='toc-subline'>낭비가 아니라 신뢰 구축 비용</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-04-하연의-강의-철학-잘-보이는-것보다-하게-만드는'>\n  <span class='toc-num'>04</span>\n  <span class='toc-text'>\n    <span class='toc-main'>하연의 강의 철학</span>\n    <span class='toc-subline'>잘 보이는 것보다 하게 만드는 것</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-05-특히-인상적이었던-부분-Gemini-Live-시'>\n  <span class='toc-num'>05</span>\n  <span class='toc-text'>\n    <span class='toc-main'>특히 인상적이었던 부분</span>\n    <span class='toc-subline'>Gemini Live 시연</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-06-현장-운영력-문제-상황에서-더-드러난-실력'>\n  <span class='toc-num'>06</span>\n  <span class='toc-text'>\n    <span class='toc-main'>현장 운영력</span>\n    <span class='toc-subline'>문제 상 n class='toc-num'>13</span>\n  <span class='toc-text'>\n    <span class='toc-main'>’25년 하반기 신입직원 입문교육과의 비교</span>\n    \n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-14-최종-평가'>\n  <span class='toc-num'>14</span>\n  <span class='toc-text'>\n    <span class='toc-main'>최종 평가</span>\n    \n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n<button class='toc-row' data-goto='chapter-15-부록-만족도-평가-자유서술-후기-원문'>\n  <span class='toc-num'>15</span>\n  <span class='toc-text'>\n    <span class='toc-main'>부록</span>\n    <span class='toc-subline'>만족도 평가 자유서술 후기 원문</span>\n  </span>\n  <span class='toc-page-num'>—</span>\n</button>\n  </div>\n  <p class='toc-hint'>2 / 2 · 목차 항목을 누르면 해당 장으로 이동합니다.</p>\n</div>"},{"kind":"chapter","title":"1. 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험","chapterStart":true,"chapterId":"chapter-01-강의의-정체성-AI-강의가-아니라-브랜드형-교육","html":"\n<div class='ch-marker'>CHAPTER 01 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>강의의 정체성</h2>\n<p class='ch-sub'>AI 강의가 아니라 브랜드형 교육 경험</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의는 단순한 AI 기능 설명이 아니었다.</p>\n<p>하연은 Gemini, Google Flow, Canva 사용법을 알려주는 것에서 멈추지 않고, 교육생이 직접 공단 캐릭터를 활용한 청렴 PC 배경화면을 만들고, 본인의 결과물을 업로드하고, 컨테스트에 참여하고, 후기를 남기는 <strong>전체 경험을 설계</strong>했다.</p>\n<p>특히 <strong>컨테스트 사이트와 자료 공유 웹사이트를 직접 만들어간 점</strong>은 행정지원팀 입장에서 매우 강한 충격이었을 가능성이 높다.</p>\n<p>외부강사도 보통은 PPT와 실습자료를 준비하는 선에서 끝난다. 그런데 내부직원인 하연은 <strong>강의 콘텐츠뿐 아니라 코딩 기반의 참여 시스템</strong>까지 만들어왔다.</p>\n<p>이 지점에서 행정지원팀은 <em class='quote'>이 사람은 단순 강사가 아니라 콘텐츠, 기술, 운영, 브랜딩을 한 번에 하는 사람</em>으로 인식했을 가능성이 크다.</p>\n"},{"kind":"chapter","title":"1. 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험","html":"\n<div class='ch-marker small'>CH. 01 · 이어서</div>\n<div class='rule small'></div>\n<h3>행정지원팀의 눈빛이 달라진 이유</h3>\n<ul class='check-list'>\n  <li>강의 내용 자체도 완성도가 높았는데, 거기에 <strong>직접 만든 컨테스트 웹사이트와 공유 웹사이트</strong>까지 더해졌다.</li>\n  <li>실습형 강의가 흔히 겪는 문제, 즉 <strong>결과물이 흐지부지되는 위험</strong>을 컨테스트 구조로 해결했다.</li>\n  <li>강의 중 수시로 HDMI 연결이 끊기는 문제, 레이저 포인터 문제, 교육생별 모바일 환경 차이 등 자칫하면 강의를 망칠 수 있는 장애물이 매우 많았지만, 하연은 <strong>당황하지 않고 흐름을 이어가며</strong> 즉각적으로 상황을 판단하고 유연하게 대처했다.</li>\n  <li>참가자들이 만든 결과물을 현장에서 전시하고 평가하게 만들어 <strong>교육을 하나의 이벤트로 전환</strong>했다.</li>\n  <li>후기 작성까지 하나의 의식처럼 설계해 <strong>교육 종료 후 감정적 여운</strong>을 남겼다.</li>\n</ul>\n<p class='close-stmt'>결국 행정지원팀은 강의 한 편이 아니라 <strong>“행사 전체가 살아나는 경험”</strong>을 본 것이다.</p>\n"},{"kind":"chapter","title":"2. 강의의 전체 흐름: 도입부터 마무리까지 이어진 경험 설계","chapterStart":true,"chapterId":"chapter-02-강의의-전체-흐름-도입부터-마무리까지-이어진-경","html":"\n<div class='ch-marker'>CHAPTER 02 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>강의의 전체 흐름</h2>\n<p class='ch-sub'>도입부터 마무리까지 이어진 경험 설계</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의의 강점은 각각의 장치가 따로 놀지 않았다는 데 있다.</p>\n<p>도입부에서 친밀감과 신뢰를 만들고, 본 강의에서는 AI에 대한 장벽을 낮추고, 실습에서는 직접 결과물을 만들게 했다.</p>\n<p>이후 컨테스트와 후기 작성, 자료실 안내, 마무리 메시지까지 연결되며 <strong>하나의 흐름</strong>이 완성됐다.</p>\n"},{"kind":"chapter","title":"2. 강의의 전체 흐름: 도입부터 마무리까지 이어진 경험 설계","html":"\n<div class='ch-marker small'>CH. 02 · 이어서</div>\n<div class='rule small'></div>\n<div class='table-wrap'>\n<table>\n  <thead>\n    <tr><th>단계</th><th>주요 장면</th><th>작동한 효과</th></tr>\n  </thead>\n  <tbody>\n    <tr><td><strong>도입</strong></td><td>인사, 아이스브레이킹, 진실 혹은 거짓, 강사 소개</td><td>청중과의 거리 축소, 강사 신뢰 형성</td></tr>\n    <tr><td><strong>목표 제시</strong></td><td><em class='quote'>AI, 생각보다 할 만 하네?</em>라는 강의 약속</td><td>참가자의 심리적 목표 설정</td></tr>\n    <tr><td><strong>기능 소개</strong></td><td>Gemini 활용 팁, Gemini Live 시연</td><td>AI 기능을 친숙하고 현실적인 도구로 인식</td></tr>\n    <tr><td><strong>실습</strong></td><td>Gemini, Google Flow, Canva 활용 배경화면 제작</td><td>직접 결과물을 만들어보는 성공 경험</td></tr>\n    <tr><td><strong>이벤트</strong></td><td>컨테스트, MBTI 맞히기, 커피상품권</td><td>집중도와 참여감 상승</td></tr>\n    <tr><td><strong>마무리</strong></td><td>자료실 안내, 직접 만든 앱 소개, 후기 요청, 확장 메시지</td><td>교육 이후의 행동 가능성 제시</td></tr>\n  </tbody>\n</table>\n</div>\n"},{"kind":"chapter","title":"3. 도입부 10분의 가치: 낭비가 아니라 신뢰 구축 비용","chapterStart":true,"chapterId":"chapter-03-도입부-10분의-가치-낭비가-아니라-신뢰-구축-","html":"\n<div class='ch-marker'>CHAPTER 03 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>도입부 10분의 가치</h2>\n<p class='ch-sub'>낭비가 아니라 신뢰 구축 비용</p>\n<div class='rule'></div>\n<p class='lede'>90분 강의에서 도입부 10분은 길어 보일 수 있다.</p>\n<p>하지만 이번 강의에서는 그 10분이 <strong>강의 전체를 버티게 만든 신뢰 구축 장치</strong>였다.</p>\n<p>하연은 자기소개를 통해 <span class='text-bold'>나를 봐주세요</span>가 아니라 <em class='quote'>제가 왜 여러분을 끝까지 데려갈 수 있는 사람인지</em>를 증명했다.</p>\n"},{"kind":"chapter","title":"3. 도입부 10분의 가치: 낭비가 아니라 신뢰 구축 비용","html":"\n<div class='ch-marker small'>CH. 03 · 이어서</div>\n<div class='rule small'></div>\n<h3>도입부에서 작동한 네 가지 핵심 장치</h3>\n<ol class='steps'>\n  <li>\n    <strong class='item-head'>아이스브레이킹</strong>\n    <p>“여러분 명단을 받고, 얼굴을 익히기 위해 직원조회로 한 분 한 분을 찾아보고 왔는데요, 대부분이 행정지원팀 소속이시더라구요. 정말 고생이 많으십니다”라고 언급하며 <strong>준비성과 공감력</strong>을 동시에 보여줬다. 지역본부 직원들이 함께 온 점도 자연스럽게 언급하며 강의 기대감을 높였다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>내부직원이라는 서사</strong>\n    <p>외부에서 온 AI 전문가가 아니라, 우연히 인재개발원의 바이브코딩 교육을 듣고 스스로 공부한 내부직원이라는 서사를 만들었다. 이 서사는 참가자들에게 <span class='text-bold'>나와 전혀 다른 사람이 하는 강의</span>가 아니라 <em class='quote'>나도 확장될 수 있음을 보여주는 사례</em>로 작동했다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>취미 → 가치관 → 강의로 연결</strong>\n    <p>러닝과 뜨개질, 바이브 코딩이라는 취미를 소개하며 꾸준함, 열정, 제작 능력, 타인에게 도움을 주는 캐릭터를 만들었다.</p>\n    <blockquote class='pull'>“뜨개질로 이런 가방을 50개 넘게 만들어 주변에 많이 선물했는데, 뜨개질 자체를 좋아하고 막 너무 재미있다기보다는, 내 정성이 담긴 물건을 내가 좋아하는 사람들에게 선물했을 때, 그들이 진심으로 고마워하고 잘 사용해주는 모습을 보고 행복을 느끼더라. 오늘 강의에서도 여러분들에게 실질적인 도움을 드리면서 행복을 느껴보려 한다”</blockquote>\n    <p>취미와 본인의 가치관을 오늘 강의로 연결했다.</p>\n  </li>\n</ol>\n"},{"kind":"chapter","title":"3. 도입부 10분의 가치: 낭비가 아니라 신뢰 구축 비용","html":"\n<div class='ch-marker small'>CH. 03 · 이어서</div>\n<div class='rule small'></div>\n<ol class='steps' start='4'>\n  <li>\n    <strong class='item-head'>Gemini 대화기록 공개</strong>\n    <p>AI로 사주를 보거나, 과음 후 커피를 마셔도 되는지 묻는 정도로 쓰던 초보였다는 사실을 보여주며 <strong>청중의 방어감을 낮췄다.</strong></p>\n  </li>\n</ol>\n<p>이 흐름은 참가자들에게 <span class='text-bold'>이 사람은 AI를 자랑하러 온 사람이 아니라,</span> 우리도 할 수 있게 데려가려는 사람이라는 인식을 만들었다.</p>\n<p class='close-stmt'>이 신뢰가 있었기 때문에 중간에 장비 문제가 터졌을 때도 청중은 강의를 <span class='text-bold'>어수선한 실패</span>로 보지 않고, <strong>강사가 끝까지 도와주려는 과정</strong>으로 받아들였을 가능성이 크다.</p>\n"},{"kind":"chapter","title":"4. 하연의 강의 철학: 잘 보이는 것보다 하게 만드는 것","chapterStart":true,"chapterId":"chapter-04-하연의-강의-철학-잘-보이는-것보다-하게-만드는","html":"\n<div class='ch-marker'>CHAPTER 04 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>하연의 강의 철학</h2>\n<p class='ch-sub'>잘 보이는 것보다 하게 만드는 것</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의에서 하연의 초점은 <span class='text-bold'>멋있어 보이는 것</span>이 아니었다.</p>\n<p>이번 강의의 핵심은 교육생들이 <strong>AI를 쉽게 느끼고, 결과물을 하나씩 가져가게 하는 것</strong>이었다.</p>\n<blockquote class='pull pull-large'>\n  <p>“듣는 사람이 ‘어? 나도 한 번 저렇게 해볼까?’라는 마음이 생기게 하는 것. 그것이 강사의 역할이라고 생각합니다.”</p>\n  <cite>— 강의 도입부에서 하연이 제시한 강의 철학</cite>\n</blockquote>\n<p>이 문장은 이번 강의의 철학을 정확히 설명한다.</p>\n<p>이번 강의의 성과는 AI 지식을 전달한 것이 아니라, <strong>AI에 대한 심리적 장벽을 낮추고 실제 행동을 유도</strong>했다는 데 있다.</p>\n<p>그래서 강의는 <span class='text-bold'>잘 아는 사람만 따라오는 강의</span>가 아니라 <em class='quote'>처음 해보는 사람도 스스로 결과물을 만들어보는 시간</em>으로 설계되었다.</p>\n"},{"kind":"chapter","title":"5. 특히 인상적이었던 부분: Gemini Live 시연","chapterStart":true,"chapterId":"chapter-05-특히-인상적이었던-부분-Gemini-Live-시","html":"\n<div class='ch-marker'>CHAPTER 05 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>특히 인상적이었던 부분</h2>\n<p class='ch-sub'>Gemini Live 시연</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의에서 특히 인상적이었던 장면 중 하나는 Gemini Live 기능 시연이었다.</p>\n<p>하연은 단순히 기능을 설명하는 대신, 영어 문장을 띄운 뒤 Gemini Live를 실시간 실행하고 <strong>카메라 인식 기능을 직접 시연</strong>했다.</p>\n<p>특히</p>\n<blockquote class='pull'>“오늘 여러분을 만나게 되어 정말 행복하고 떨립니다. 너무 긴장돼서 오늘 한 끼도 못 먹고 청심환도 먹고 왔습니다. 어젯밤에는 심장이 너무 두근거려서 잠도 제대로 못 잤어요”</blockquote>\n<p>라며 Gemini가 본인의 실제 감정을 읽게 한 뒤,</p>\n<p><em class='quote'>\"접니다, 제 얘기입니다ㅎㅎ\"</em>라고 연결하며 <strong>현장 웃음과 공감을 동시에 이끌어냈다.</strong></p>\n<p>이 장면은 AI를 단순 기술이 아니라 <strong>사람 가까이에 있는 도구</strong>처럼 느끼게 만들었다.</p>\n<p>참가자들은 기능 이해와 동시에 강사의 인간적인 긴장감, 현장 몰입감, AI에 대한 거리감 감소를 함께 경험했다.</p>\n<p class='close-stmt'>이는 단순 기능 설명형 강의가 아니라 <strong>“기술 + 감정 + 현장 경험”을 결합한 브랜드형 강의 스타일</strong>에 가까웠다.</p>\n"},{"kind":"chapter","title":"6. 현장 운영력: 문제 상황에서 더 드러난 실력","chapterStart":true,"chapterId":"chapter-06-현장-운영력-문제-상황에서-더-드러난-실력","html":"\n<div class='ch-marker'>CHAPTER 06 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>현장 운영력</h2>\n<p class='ch-sub'>문제 상황에서 더 드러난 실력</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의는 기술적으로 매우 불안정한 환경이었다.</p>\n<div class='stats-row'>\n  <div class='stat'><div class='stat-num'>20<sup>+</sup></div><div class='stat-label'>HDMI 연결<br>끊김 발생</div></div>\n  <div class='stat'><div class='stat-num'>2<sup>회</sup></div><div class='stat-label'>레이저 포인터<br>낙하·분리</div></div>\n  <div class='stat'><div class='stat-num'>20<sup>명</sup></div><div class='stat-label'>서로 다른<br>모바일 환경</div></div>\n</div>\n<p>실습 속도 역시 예상보다 느렸고, 강의 중에는 수시로 프롬프트와 팁을 단톡방에 올리고, 실행 과정을 보여주기 위해 노트북을 직접 조작해야 했다.</p>\n<p class='lede'>그럼에도 강의는 무너지지 않았다.</p>\n<p>오히려 교육생들은 결과물을 만들었고, 운영진은 강한 감탄을 보였다. 이는 하연이 단순 발표자가 아니라 <strong>현장을 끝까지 살려내는 운영형 강사</strong>라는 것을 보여준다.</p>\n<h3>이 상황에서 드러난 역량</h3>\n<ul class='check-list compact'>\n  <li>장비 문제가 생겨도 중심을 잃지 않는 <strong>안정감</strong></li>\n  <li>모바일 환경 차이를 현장에서 확인하고 즉석 해결책을 찾는 <strong>기민함</strong></li>\n  <li>실습생들이 못 따라오는 상황에서도 결과물까지 데려가는 <strong>집요함</strong></li>\n  <li>운영진과 협업하며 현장을 함께 살리는 <strong>분위기 조성</strong></li>\n  <li>문제 자체보다 강사의 에너지와 방향성이 더 강하게 기억되게 만드는 <strong>장악력</strong></li>\n</ul>\n"},{"kind":"chapter","title":"7. 기존 직원 대상 강의에서 얻은 새로운 무기","chapterStart":true,"chapterId":"chapter-07-기존-직원-대상-강의에서-얻은-새로운-무기","html":"\n<div class='ch-marker'>CHAPTER 07 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>기존 직원 대상 강의에서 얻은 새로운 무기</h2>\n\n<div class='rule'></div>\n<p class='lede'>기존 직원들은 신입직원이나 대학생과 다르게 리액션이 크지 않다.</p>\n<p>웃긴 이야기를 해도 크게 웃지 않고, 질문을 던져도 대답하지 않는 경우가 많다.</p>\n<p>하연은 이번에 이 차이를 빠르게 읽었다.</p>\n<p>예전 같으면 반응이 없다는 이유로 당황하거나 어색해졌을 수 있지만, 이번에는 <em class='quote'>이 집단은 원래 반응 방식이 다르다</em>고 판단하고 <strong>전략을 바꿨다.</strong></p>\n<blockquote class='pull'>“이해되셨으면 고개 끄덕여주세요.”</blockquote>\n<p>이라는 방식으로 <strong>비언어적 피드백</strong>을 끌어낸 것이 대표적이다.</p>\n<p>이것은 하연이 청중의 반응 없음에 끌려가지 않고, <strong>집단 특성에 맞게 반응 구조를 재설계한 순간</strong>이다.</p>\n<p class='close-stmt'>앞으로 기존 직원, 관리자, 보수적 조직을 대상으로 강의할 때 매우 중요한 무기가 될 수 있다.</p>\n"},{"kind":"chapter","title":"8. 강의 마무리 방식이 남긴 영향","chapterStart":true,"chapterId":"chapter-08-강의-마무리-방식이-남긴-영향","html":"\n<div class='ch-marker'>CHAPTER 08 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>강의 마무리 방식이 남긴 영향</h2>\n\n<div class='rule'></div>\n<p class='lede'>이번 강의의 마무리 방식 역시 매우 인상적이었다.</p>\n<p>보통 실습형 교육은 결과물 제작이 끝나면 단순 만족도 조사 후 종료되는 경우가 많다. 하지만 하연은 <strong>마지막 순간까지 참가자들의 감정 흐름과 이후 행동 가능성을 함께 설계</strong>했다.</p>\n<h3>강의 마지막 순서</h3>\n<ol class='steps'>\n  <li>\n    <strong class='item-head'>MBTI 맞히기 이벤트</strong>\n    <p>강사의 MBTI 맞히기 이벤트를 진행하고, 정답자에게 커피 상품권을 증정했다. 이때 <em class='quote'>어떤 브랜드 좋아하시냐</em>고 묻는 작은 배려까지 보여주었다. 정답자는 강의 종료 후 자신도 ENTJ라고 밝히며 하연의 연락처를 받아갔다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>만족도 평가 작성 유도</strong>\n    <p>배경화면 컨테스트 결과 집계 시간 동안 개인 만족도 평가 작성을 유도했다.</p>\n    <blockquote class='pull'>“집에 가서 샤워 후 맛있는 음식과 소주를 마시며 강의 후기를 보면 소주가 그렇게 달 수가 없다. 오늘도 제가 소주를 맛있게 먹을 수 있도록 구체적인 피드백을 남겨주시면 감사하겠다.”</blockquote>\n    <p>라며, 참가자들에게 인간적 호감과 진심이 담긴 강의 후기를 얻어냈다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>컨테스트 시상</strong>\n    <p>당선작을 발표하고 선물을 증정했다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>자료실·앱 소개</strong>\n    <p>컨테스트 웹 자료실에 업로드한 HTML 기반 강의자료와 직접 제작한 앱을 소개했다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>확장 메시지</strong>\n    <p>AI 학습 경험이 일상과 업무로 확장되기를 바라는 마무리 메시지를 전달했다.</p>\n  </li>\n</ol>\n"},{"kind":"chapter","title":"8. 강의 마무리 방식이 남긴 영향","html":"\n<div class='ch-marker small'>CH. 08 · 이어서</div>\n<div class='rule small'></div>\n<p>특히 단순히 <span class='text-bold'>오늘 배운 기능을 이렇게 활용해보세요</span> 수준으로 끝낸 것이 아니라,</p>\n<blockquote class='pull pull-large'>\n  <p>“몇 달 전까지 AI 초보였던 제가 단 2박 3일의 바이브 코딩 교육을 듣고 이런 결과물을 만들 수 있었습니다. 여러분들도 오늘 배경화면 하나를 만들었던 경험이 앞으로 일상과 업무에서 확장되시기를 바랍니다.”</p>\n</blockquote>\n<p>이 문장은 참가자들에게 <span class='text-bold'>강사라서 가능한 것</span>이 아니라 <em class='quote'>나도 시작하면 확장될 수 있다</em>는 감각을 남겼다.</p>\n<p>또한 <em class='quote'>AI 관련해서 어렵거나 궁금한 점 있으면 언제든 메신저 주세요</em>라고 이야기한 부분 역시 의미가 크다. 대부분의 강의는 종료와 동시에 관계가 끝나지만, 하연은 참가자들에게 <strong>강의 이후에도 연결 가능한 사람</strong>이라는 인상을 남겼다.</p>\n<p>마지막으로,\n<blockquote class='pull speech'>\n<p>\"오늘 긴 시간 동안, 강의에 장치적인 문제도 있었고 실습에도 조금 어려운 부분들이 있었는데 끝까지 잘 따라와 주시고 좋은 결과물을 만들어 주셔서 감사했습니다.\"</p>\n</blockquote>\n라는 멘트는 참가자들을 단순 수강생이 아니라 <strong>함께 결과를 만든 사람들처럼 존중</strong>하는 방식이었다.</p>\n<p>이어서 하연은 <em class='quote'>지금까지, 대전서부지사 김하연 대리였습니다. 감사합니다</em>라고 마무리했다.</p>\n<p class='close-stmt'>이 마지막 멘트는 전략적으로도 훌륭했다. 자신의 이름과 소속을 분명히 남기면서, <strong>강의의 책임 주체가 누구인지 또렷하게 각인</strong>시켰기 때문이다. 참가자들에게는 강의자가 단순 진행자가 아니라 <strong>끝까지 결과를 책임진 내부 구성원</strong>이라는 인상을 남겼고, 행정지원팀에는 이후 다시 떠올리고 의뢰하기 쉬운 이름과 소속을 남기는 효과가 있었다.</p>\n"},{"kind":"chapter","title":"9. 만족도 평가와 강의 후기에서 확인된 효과","chapterStart":true,"chapterId":"chapter-09-만족도-평가와-강의-후기에서-확인된-효과","html":"\n<div class='ch-marker'>CHAPTER 09 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>만족도 평가와 강의 후기에서 확인된 효과</h2>\n\n<div class='rule'></div>\n<p class='lede'>이번 강의의 성과는 현장 반응뿐 아니라 만족도 평가에서도 확인된다.</p>\n<p>총 <strong>20명의 응답 중 <em class='quote'>어렵다</em> 또는 <em class='quote'>매우 어렵다</em>는 응답은 0건</strong>이었다.</p>\n<p>기존 직원 대상 AI 실습형 강의였다는 점을 고려하면, 이 결과는 강의 설계가 <strong>참가자의 심리적 장벽을 효과적으로 낮췄음</strong>을 보여준다.</p>\n<div class='table-wrap'>\n<table>\n  <thead><tr><th>강의 난이도 응답</th><th>응답 수</th><th>해석</th></tr></thead>\n  <tbody>\n    <tr><td><strong>매우 쉽다</strong></td><td class='num'>8</td><td>AI 실습에 대한 진입장벽을 크게 낮춘 응답</td></tr>\n    <tr><td><strong>쉽다</strong></td><td class='num'>6</td><td>초보자도 따라올 수 있는 흐름으로 인식</td></tr>\n    <tr><td><strong>적절했다</strong></td><td class='num'>6</td><td>실습 난이도와 설명 수준의 균형이 맞았다는 신호</td></tr>\n    <tr><td><strong>어렵다 / 매우 어렵다</strong></td><td class='num'>0</td><td>기존 직원 대상 AI 특강에서 매우 의미 있는 결과</td></tr>\n  </tbody>\n</table>\n</div>\n"},{"kind":"chapter","title":"9. 만족도 평가와 강의 후기에서 확인된 효과","html":"\n<div class='ch-marker small'>CH. 09 · 이어서</div>\n<div class='rule small'></div>\n<h3>후기에서 반복적으로 나타난 핵심 반응</h3>\n<div class='tag-grid'>\n  <span class='tag'>쉽고 재밌었다</span>\n  <span class='tag'>AI 활용 자신감</span>\n  <span class='tag'>실생활·업무에 적용 의지</span>\n  <span class='tag'>딕션·발성·에너지</span>\n  <span class='tag'>강사의 진심</span>\n  <span class='tag'>경험의 압축</span>\n  <span class='tag'>또 듣고 싶다</span>\n  <span class='tag'>물어보고 싶다</span>\n</div>\n<blockquote class='pull pull-large'>\n  <p>“공단 들어와서 이렇게 집중이 잘되고 유익한 강의가 없었습니다. 딕션과 발성도 너무 좋으시고 에너지 가득해서 강의 듣는 내내 좋았습니다. 강의에 진심이 느껴지셔서 너무 멋졌습니다.”</p>\n  <cite>— 만족도 평가 자유서술 후기</cite>\n</blockquote>\n"},{"kind":"chapter","title":"9. 만족도 평가와 강의 후기에서 확인된 효과","html":"\n<div class='ch-marker small'>CH. 09 · 이어서</div>\n<div class='rule small'></div>\n<blockquote class='pull pull-large'>\n  <p>“짧은 시간임에도 대리님의 경험과 노력이 압축된 매우 유용한 강의였습니다. 강의를 듣고 이제 저도 AI 활용에 대한 관심과 자신감이 늘었습니다.”</p>\n  <cite>— 만족도 평가 자유서술 후기</cite>\n</blockquote>\n<blockquote class='pull pull-large'>\n  <p>“AI로 홍보자료를 만들고 싶으나 혼자서 힘든 부분을 조금이나마 해소할 수 있었던 것 같습니다. 감사합니다. 또 듣고 싶어요. 어려움이 있을 때 여쭤보고 싶습니다.”</p>\n  <cite>— 만족도 평가 자유서술 후기</cite>\n</blockquote>\n"},{"kind":"chapter","title":"10. 행정지원팀 반응 상세 분석","chapterStart":true,"chapterId":"chapter-10-행정지원팀-반응-상세-분석","html":"\n<div class='ch-marker'>CHAPTER 10 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>행정지원팀 반응 상세 분석</h2>\n\n<div class='rule'></div>\n<p class='lede'>이번 강의에서 가장 중요한 외부 피드백은 교육생 후기만이 아니었다.</p>\n<p>오히려 행사를 기획하고 외부강사를 많이 접해본 행정지원팀 직원들의 현장 반응이 더 전략적으로 중요했다. 이들은 단순 수강생이 아니라 <strong>행사 품질을 평가할 수 있는 운영자</strong>이기 때문이다.</p>\n<div class='person-card'>\n  <div class='person-label'>VOICE · 01</div>\n  <div class='person-name'>팀장님</div>\n  <blockquote class='pull pull-large'>\n    <p>“그동안 외부 강사 쓰느라 몇백만원 들였는데 왜 쓴 거야..? 훨씬 잘하시잖아.. 진짜 돈이 너무 아까운데”</p>\n  </blockquote>\n  <p>이 발언은 단순한 칭찬이 아니다. 예산과 행사 효과를 동시에 보는 관리자 입장에서, <strong>내부직원이 외부강사 이상의 만족도를 만들어냈다고 판단</strong>한 것이다.</p>\n  <p>또한 마무리 멘트에서 <em class='quote'>이 대리님 출장도 많으시고 업무도 정말 바쁘시다. 그럼에도 3주 전부터 교안을 제작하고, 우리 직원들과 꾸준히 소통하시면서 이렇게 좋은 강의를 해 주셨다. 저희가 행사를 정말 많이 기획하고 외부 전문 강사도 많이 써봐서 아는데, 이렇게까지 해주시는 분 진짜 없다</em>고 공개적으로 언급했다.</p>\n  <p class='close-stmt'>이는 강의 만족을 개인적으로 표현한 것이 아니라, <strong>행사 성공을 공식화한 장면</strong>에 가깝다.</p>\n</div>\n"},{"kind":"chapter","title":"10. 행정지원팀 반응 상세 분석","html":"\n<div class='ch-marker small'>CH. 10 · 이어서</div>\n<div class='rule small'></div>\n<div class='person-card'>\n  <div class='person-label'>VOICE · 02</div>\n  <div class='person-name'>노트북 연결을 도와주던 과장님</div>\n  <p>이 과장님은 장비 문제를 가장 가까이서 본 사람이다. 강의가 흔들릴 수 있는 순간, 하연이 현장을 어떻게 유지하는지를 계속 지켜봤다.</p>\n  <blockquote class='pull'>“진짜.. 미쳤어요..”<br>“대리님 조사 다니실 때가 아니에요”<br>“지역본부 행정지원팀 오세요. 요양직도 올 수 있는지 알아볼게요”</blockquote>\n  <p>이 반응은 단순한 감탄보다 <strong>“이 사람은 지금 포지션보다 더 큰 판에서 써야 할 사람”</strong>이라는 충격에 가깝다.</p>\n  <p>또한 하연이 장비 문제에 대해 사과하자, 오히려 매우 미안해하며 <em class='quote'>저희 강의실이 문제예요, 선이 이상했어요. 다음에는 제대로 준비해놓겠습니다</em>라고 말한 것도 의미가 크다.</p>\n  <p class='close-stmt'>이는 강사의 문제가 아니라 <strong>운영 환경이 강사를 충분히 받쳐주지 못했다는 인식</strong>이 생긴 것이다.</p>\n</div>\n"},{"kind":"chapter","title":"10. 행정지원팀 반응 상세 분석","html":"\n<div class='ch-marker small'>CH. 10 · 이어서</div>\n<div class='rule small'></div>\n<div class='person-card'>\n  <div class='person-label'>VOICE · 03</div>\n  <div class='person-name'>강의 의뢰 과장님</div>\n  <p>이 과장님은 별도 강사료를 지급할 수 없는 상황에서도 하연이 매우 열심히 준비하는 모습을 보고 <strong>개인적으로 공단 캐릭터 굿즈를 챙겨주고 싶어 했다.</strong></p>\n  <p><em class='quote'>공단 캐릭터 굿즈 좋아하시냐</em>, <em class='quote'>그거라도 드리고 싶다</em>, <em class='quote'>어떤 캐릭터 좋아하시냐</em>라고 물은 것은 행사 담당자의 형식적 감사가 아니라 <strong>인간적인 감사의 표현</strong>이다.</p>\n  <p>특히 지역본부 비품이 아니라 본인이 개인적으로 모아둔 굿즈를 챙겨줬다는 점은 중요하다. 이는 하연이 제공한 가치에 비해 <strong>공식 보상이 부족하다고 느꼈고, 개인적으로라도 보답하고 싶었다</strong>는 의미로 해석된다.</p>\n</div>\n<div class='person-card'>\n  <div class='person-label'>VOICE · 04</div>\n  <div class='person-name'>AX 서포터즈 담당 대리님</div>\n  <p>그동안 무뚝뚝하고 실무적인 태도였던 담당 대리님이 강의 직후 현장에서 <em class='quote'>퇴사하고 전문 강사 하세요</em>라고 하거나, <em class='quote'>대리님 퇴사하고 강사하세요.. 올해만 지나고..ㅎㅎ</em>라고 메신저를 보내놓은 것은 <strong>강의 전후 인식 변화가 매우 컸다</strong>는 뜻이다.</p>\n  <p>또한 강의 종료 후 부장님께 인사드리기 위해 행정지원부로 함께 이동하는 과정에서 하연이 받은 선물(굿즈)을 보며 <em class='quote'>그거 제 거예요, 제가 가져온 거예요 ㅎㅎ</em>라고 강조한 것은 <strong>자신도 이 행사와 하연의 성공에 기여했다는 정서적 참여</strong>의 표현으로 볼 수 있다.</p>\n</div>\n"},{"kind":"chapter","title":"10. 행정지원팀 반응 상세 분석","html":"\n<div class='ch-marker small'>CH. 10 · 이어서</div>\n<div class='rule small'></div>\n<h3>행정지원팀 반응의 핵심 해석</h3>\n<p class='lede'>행정지원팀은 <em class='quote'>좋은 강의</em>를 본 것이 아니라, <strong>“행사가 살아나는 장면”</strong>을 봤다.</p>\n<p>공공기관 교육은 딱딱하고 수동적으로 흐르기 쉬운데, 하연은 <strong>참여 → 실습 → 결과물 → 컨테스트 → 선물 → 후기</strong>까지 하나의 경험으로 엮었다.</p>\n<p class='close-stmt'>그래서 이들은 단순 강사가 아니라 <strong>행사 전체의 온도를 바꾸는 사람</strong>을 본 것이다.</p>\n"},{"kind":"chapter","title":"11. 사람 경험 설계 능력: 하연의 희귀한 재능","chapterStart":true,"chapterId":"chapter-11-사람-경험-설계-능력-하연의-희귀한-재능","html":"\n<div class='ch-marker'>CHAPTER 11 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>사람 경험 설계 능력</h2>\n<p class='ch-sub'>하연의 희귀한 재능</p>\n<div class='rule'></div>\n<p class='lede'>이번 강의에서 가장 강하게 드러난 재능은 단순 강의력이 아니다.</p>\n<p>하연은 <strong>사람 경험을 설계하는 능력</strong>을 보여줬다.</p>\n<ol class='steps'>\n  <li>\n    <strong class='item-head'>도입부</strong>\n    <p>인사말, 아이스브레이킹, 진실 혹은 거짓 게임, 자기소개로 청중의 방어감을 낮추고, <em class='quote'>나도 AI 초보였다</em>는 서사로 공감대를 만들었다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>중간 강의</strong>\n    <p>Gemini 활용 팁 소개, Gemini Live 실시간 시연, Google Flow와 Canva 단계별 실습으로 직접 결과물(PC 배경화면)을 만들게 했다. 장비 문제와 모바일 환경 차이 속에서도 끝까지 데려갔다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>컨테스트</strong>\n    <p>직접 만든 컨테스트 웹사이트에 결과물을 업로드하고, 투표와 시상으로 성취감과 재미를 만들었다. 교육이 행사 전체로 확장되는 순간이었다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>커피상품권과 취향 질문</strong>\n    <p>MBTI 맞히기 이벤트 정답자에게 커피 상품권을 증정하면서 <em class='quote'>어떤 브랜드 좋아하시냐</em>고 개인적으로 물었다. 작은 배려였지만 개인적 관심으로 받아들여졌다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>후기 요청</strong>\n    <p>컨테스트 집계 시간 동안 만족도 평가를 받으면서 <em class='quote'>소주가 달 수 있도록 구체적인 후기를 남겨달라</em>는 방식으로 하나의 감성적 장면을 만들었다.</p>\n  </li>\n  <li>\n    <strong class='item-head'>마지막 메시지</strong>\n    <p>자료실·직접 만든 앱 소개, 메신저로 언제든 연락 가능하다는 연결 제안, 그리고 <em class='quote'>오늘 경험이 일상과 업무로 확장되기를 바란다</em>는 메시지로 마무리했다.</p>\n  </li>\n</ol>\n"},{"kind":"chapter","title":"11. 사람 경험 설계 능력: 하연의 희귀한 재능","html":"\n<div class='ch-marker small'>CH. 11 · 이어서</div>\n<div class='rule small'></div>\n<p>이 구조는 단순한 교육 설계가 아니라, <strong>참가자가 강의를 기억하고 다시 행동하게 만드는 경험 설계</strong>에 가깝다.</p>\n<p class='lede'>이것이 하연의 희귀한 재능이다.</p>\n<p class='close-stmt'>공공기관 내부에서 이런 조합 — <strong>전달력, 기획력, 코딩 활용, 디자인 감각, 실습 운영, 인간적 매력, 현장 대응력</strong> — 을 동시에 가진 사람은 많지 않다.</p>\n"},{"kind":"chapter","title":"12. 이번 경험이 하연에게 남긴 변화","chapterStart":true,"chapterId":"chapter-12-이번-경험이-하연에게-남긴-변화","html":"\n<div class='ch-marker'>CHAPTER 12 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>이번 경험이 하연에게 남긴 변화</h2>\n\n<div class='rule'></div>\n<p class='lede'>하연은 원래 인정욕구가 큰 사람이다.</p>\n<p>하지만 이번에는 인정욕구가 <em class='quote'>불안하게 매달리는 방식</em>이 아니라, 충분히 충족된 뒤 <strong>“나를 알아봐준 사람들에게 더 해주고 싶다”</strong>는 방향으로 바뀌었다.</p>\n<p>이전에는 특정 강의 자리에 지원해서 선택받는 것 자체가 중요했다면, 이번 경험 이후에는 <strong>스스로의 가치를 키워 “안 쓰면 아쉬운 사람”이 되는 방향</strong>으로 사고가 이동하고 있다.</p>\n<p class='close-stmt'>이는 단순한 자신감 상승이 아니라, <strong>자기 영향력의 구조를 인식하기 시작한 변화</strong>에 가깝다.</p>\n"},{"kind":"chapter","title":"13. ’25년 하반기 신입직원 입문교육과의 비교","chapterStart":true,"chapterId":"chapter-13-25년-하반기-신입직원-입문교육과의-비교","html":"\n<div class='ch-marker'>CHAPTER 13 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>두 강의의 비교</h2>\n<p class='ch-sub'>’25년 하반기 신입직원 입문교육 vs. 이번 지역본부 AI 특강</p>\n<div class='rule'></div>\n<p class='lede'>작년 12월에 진행한 ’25년 하반기 신입직원 입문교육은 하연에게 <em class='quote'>스타가 된 감각</em>을 줬다.</p>\n<p>큰 무대, 신입들의 동경, 130개가 넘는 후기는 하연의 <strong>스타성, 무대감, 카리스마</strong>를 확인시켜준 사건이었다.</p>\n<p class='lede'>반면 이번 지역본부 AI 특강은 감정의 종류가 달랐다.</p>\n<p>이번에는 <strong>실력 있는 사람들에게 인정받는 쾌감</strong>이 핵심이었다.</p>\n<p class='close-stmt'>특히 행사와 외부강사를 많이 경험한 행정지원팀, 팀장, 과장, 대리들이 즉각적으로 강한 반응을 보였다는 점에서 <strong>만족감의 결이 훨씬 묵직했다.</strong></p>\n"},{"kind":"chapter","title":"13. ’25년 하반기 신입직원 입문교육과의 비교","html":"\n<div class='ch-marker small'>CH. 13 · 이어서</div>\n<div class='rule small'></div>\n<div class='table-wrap'>\n<table class='compare-table'>\n  <thead>\n    <tr><th>구분</th><th>’25년 하반기 신입직원 입문교육</th><th>이번 지역본부 AI 특강</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class='cmp-label'>핵심 쾌감</td><td>스타가 된 느낌, 팬덤, 동경</td><td><strong>실력 있는 사람들에게 실력으로 인정받는 감각</strong></td></tr>\n    <tr><td class='cmp-label'>강사 모드</td><td>큰 무대를 장악하는 <strong>퍼포머</strong></td><td>현장을 운영하고 사람을 움직이는 <strong>디렉터</strong></td></tr>\n    <tr><td class='cmp-label'>청중 반응</td><td>감정 표현이 크고 후기 폭발적</td><td>현장 리액션은 작지만 결과와 운영진 반응이 강함</td></tr>\n    <tr><td class='cmp-label'>만족의 근거</td><td>아나운서 같다, 교수님 같다, 예쁘다, 전문강사 같다</td><td>외부강사 이상이다, 이런 사람 처음이다, 행정지원팀 오세요</td></tr>\n    <tr><td class='cmp-label'>조직 영향력</td><td>신입들에게 강한 인상</td><td>행사 운영진과 관리자에게 직접 각인</td></tr>\n  </tbody>\n</table>\n</div>\n"},{"kind":"chapter","title":"13. ’25년 하반기 신입직원 입문교육과의 비교","html":"\n<div class='ch-marker small'>CH. 13 · 이어서</div>\n<div class='rule small'></div>\n<p class='lede'>이 비교에서 중요한 점은 <strong>“하나를 버리고 다른 하나로 이동했다”</strong>는 것이 아니다.</p>\n<p>신입직원 교육은 하연의 <strong>스타성과 무대감</strong>을 확인시켜준 강의였고, 지역본부 AI 특강은 하연의 <strong>영향력, 현장 운영력, 경험 설계 능력</strong>을 확인시켜준 강의였다.</p>\n<p class='close-stmt'>두 경험은 서로 다른 만족을 주지만, 이번 특강은 <strong>하연이 더 넓은 강의 영역으로 확장될 수 있음을 보여준 사건</strong>이었다.</p>\n"},{"kind":"chapter","title":"14. 최종 평가","chapterStart":true,"chapterId":"chapter-14-최종-평가","html":"\n<div class='ch-marker'>CHAPTER 14 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>최종 평가</h2>\n\n<div class='rule'></div>\n<p class='lede'>이번 지역본부 AI 특강은 하연에게 매우 중요한 <strong>전환점</strong>이었다.</p>\n<p>이전에는 <em class='quote'>나는 신입직원 교육에 특화된 사람</em>이라는 자기 인식이 강했지만, 이번 강의를 통해 하연은 자신이 <strong>변화, 혁신, 실습형 교육, 조직 내 콘텐츠 기획</strong>에서도 강하게 작동할 수 있음을 확인했다.</p>\n<blockquote class='pull pull-large final-quote'>\n  <p>“하연은 단순히 발표를 잘하는 직원이 아니라, 사람들의 심리적 장벽을 낮추고 참여를 설계하며 결과물을 만들게 하고, <strong>행사 전체의 온도를 바꾸는 브랜드형 내부강사로 성장할 가능성이 높은 사람</strong>이다.”</p>\n  <cite>— ChatGPT, 최종 평가</cite>\n</blockquote>\n"},{"kind":"chapter","title":"부록: 만족도 평가 자유서술 후기 원문","chapterStart":true,"chapterId":"chapter-15-부록-만족도-평가-자유서술-후기-원문","html":"\n<div class='ch-marker'>CHAPTER 15 <span class='ch-of'>— 15</span></div>\n<h2 class='ch-title'>부록</h2>\n<p class='ch-sub'>만족도 평가 자유서술 후기 원문</p>\n<div class='rule'></div>\n<p>아래 후기는 2026.05.21. 지역본부 AI 특강 만족도 평가에서 수집된 자유서술 응답이다. 문장 일부의 구어체와 감탄 표현은 강의 당시의 생생한 반응을 보존하기 위해 가능한 한 원문 분위기를 유지했다.</p>\n<div class='review-list'>\n  <div class='review'>\n  <div class='review-num'>P · 01</div>\n  <p class='review-text'>좋은 강의 감사드립니당~</p>\n</div><div class='review'>\n  <div class='review-num'>P · 02</div>\n  <p class='review-text'>넘 유익하고 좋았습니다...!!!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 03</div>\n  <p class='review-text'>강의 더 듣고 싶어요!!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 04</div>\n  <p class='review-text'>강사님 너무 친절하고 상세하게 강의해주셔서 고맙습니다.</p>\n</div><div class='review'>\n  <div class='review-num'>P · 05</div>\n  <p class='review-text'>감사합니다 고생하셨습니다!!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 06</div>\n  <p class='review-text'>자세한 설명과 새로운 지식을 알게되어 매우 만족</p>\n</div><div class='review'>\n  <div class='review-num'>P · 07</div>\n  <p class='review-text'>좋은 강의 감사합니다!</p>\n</div>\n</div>\n"},{"kind":"chapter","title":"부록: 만족도 평가 자유서술 후기 원문","html":"\n<div class='ch-marker small'>CH. 15 · 이어서</div>\n<div class='rule small'></div>\n<div class='review-list'>\n  <div class='review'>\n  <div class='review-num'>P · 08</div>\n  <p class='review-text'>아니 진짜 대박이에요 미치신거 같아요. 왜 여기 계세요.... 인정조사 다니실 때가 아니에요</p>\n</div><div class='review'>\n  <div class='review-num'>P · 09</div>\n  <p class='review-text'>강의내용도 너무 알차고 조리있게 설명도 잘해주셔서 유익한 강의였습니다. 감사합니다.</p>\n</div><div class='review'>\n  <div class='review-num'>P · 10</div>\n  <p class='review-text'>대리님 너무너무 재밌고 유익한 강의였습니다! AI는 그냥 궁금한거 물어보기만 했지 이런식으로 활용할 줄 몰랐는데 대리님 덕분에 잘 활용할거같습니다! 유익한 강의 감사드립니다 :) ♥</p>\n</div><div class='review'>\n  <div class='review-num'>P · 11</div>\n  <p class='review-text'>유익한 강의 준비해주셔서 감사드립니다! 목소리랑 딕션이 좋으셔서 강의내용이 잘 들렸습니다!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 12</div>\n  <p class='review-text'>공단 들어와서 이렇게 집중이 잘되고 유익한 강의가 없었습니다.. 딕션과 발성도 너무 좋으시고 에너지 가득해서 강의 듣는 내내 좋았습니다:) 강의에 진심이 느껴지셔서 너무 멋졌습니다! 감사합니다</p>\n</div><div class='review'>\n  <div class='review-num'>P · 13</div>\n  <p class='review-text'>너무 재밌었습니당! 아이폰과 갤럭시 둘다 어떻게 들어가는지 파악이 된다면 효율성이 엄청 높아질 것 같습니다 ㅎㅎ 유익한 정보 알려주셔서 감사합니다!!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 14</div>\n  <p class='review-text'>강의 알차게 준비하시느라 치열하게 고민하고 정성껏 준비하신게 보여요. 고생많으셨어요. 오늘 교육 유익했습니다.</p>\n</div>\n</div>\n"},{"kind":"chapter","title":"부록: 만족도 평가 자유서술 후기 원문","html":"\n<div class='ch-marker small'>CH. 15 · 이어서</div>\n<div class='rule small'></div>\n<div class='review-list'>\n  <div class='review'>\n  <div class='review-num'>P · 15</div>\n  <p class='review-text'>AI에 이렇게 열정적이신 모습 보면서 대단하시다고 느꼈어요! 강사님이 열정적이셔서 저도 열심히 수업을 들을 수 있었습니다! 강사님 덕분에 지사 돌아가서 어떻게 활용하면 좋을지 아이디어 얻고 갑니다! 고생 많으셨습니다 감사합니다~~</p>\n</div><div class='review'>\n  <div class='review-num'>P · 16</div>\n  <p class='review-text'>소주 맛나게드세여 강의 진짜 너무 좋았는데 퇴직하고 강사하실 예정이죠 솔직히??? 아니라면 재능이 너무 아깝습니다..</p>\n</div><div class='review'>\n  <div class='review-num'>P · 17</div>\n  <p class='review-text'>짧은 시간임에도 대리님의 경험과 노력이 압축된 매우 유용한 강의였습니다! 강의를 듣고 이제 저도 AI활용에 대한 관심과 자신감이 늘었습니다!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 18</div>\n  <p class='review-text'>AI잘 활용하지도 않고 인권플루언서 교육이라고 하기에 재미 없을 줄 알았는데, 대리님 너무 말씀도 잘 해주시고 재밌는 소재의 강의여서 시간이 빨리 갔던것같습니다! 실 생활에도 활용 잘 해보겠습니다! 대리님 예뻐요!(저 여자에요 ㅎㅎ)</p>\n</div><div class='review'>\n  <div class='review-num'>P · 19</div>\n  <p class='review-text'>정말 만족한 강의였습니다. ai로 홍보자료를 만들고 싶으나 혼자서 힘든 부분을 조금이나마 해소할 수 있었던 것 같습니다. 감사합니다! 또 듣고싶어요! 어려움이 있을 때 여쭤보고 싶습니다ㅜㅜ!</p>\n</div><div class='review'>\n  <div class='review-num'>P · 20</div>\n  <p class='review-text'>전달 잘 해주시려 노력한 모습이 보였습니다. 새내기 강사이지만, 머지않아 인개원 강사로 활약하고 있을 대리님 모습이 눈에 선합니다ㅎㅎ 유익한 강의였고 장비 문제로 좀 당황스러웠을텐데, 고생 많으셨어요!</p>\n</div>\n</div>\n"},{"kind":"colophon","title":"마지막 장","html":"\n<section class='colophon-page'>\n  <div class='colophon-rule top'></div>\n  <p class='colophon-kicker'>END OF BOOK</p>\n  <h2>\n    <span class='cover-title-main'>건이강이, AI를 만나다</span>\n    <span class='cover-title-subtitle'>AI 특강 회고 리포트</span>\n  </h2>\n  <dl class='colophon-list'>\n    <div><dt>발행일</dt><dd>2026.05.23.</dd></div>\n    <div><dt>지은이</dt><dd>ChatGPT</dd></div>\n    <div><dt>기획 · 강의</dt><dd>김하연 대리</dd></div>\n    <div><dt>이메일</dt><dd>1023am0645@gmail.com</dd></div>\n  </dl>\n  <p class='colophon-note'>\n    이 전자책은 2026.05.21.에 실시한<br>\n    대전세종충청지역본부 AI 특강 회고 기록을 바탕으로 제작되었습니다.\n  </p>\n  <div class='colophon-rule bottom'></div>\n</section>\n"}],"chapterPageMap":{"chapter-01-강의의-정체성-AI-강의가-아니라-브랜드형-교육":6,"chapter-02-강의의-전체-흐름-도입부터-마무리까지-이어진-경":8,"chapter-03-도입부-10분의-가치-낭비가-아니라-신뢰-구축-":10,"chapter-04-하연의-강의-철학-잘-보이는-것보다-하게-만드는":13,"chapter-05-특히-인상적이었던-부분-Gemini-Live-시":14,"chapter-06-현장-운영력-문제-상황에서-더-드러난-실력":15,"chapter-07-기존-직원-대상-강의에서-얻은-새로운-무기":16,"chapter-08-강의-마무리-방식이-남긴-영향":17,"chapter-09-만족도-평가와-강의-후기에서-확인된-효과":19,"chapter-10-행정지원팀-반응-상세-분석":22,"chapter-11-사람-경험-설계-능력-하연의-희귀한-재능":26,"chapter-12-이번-경험이-하연에게-남긴-변화":28,"chapter-13-25년-하반기-신입직원-입문교육과의-비교":29,"chapter-14-최종-평가":32,"chapter-15-부록-만족도-평가-자유서술-후기-원문":33}}</script>
<script>
const data = JSON.parse(document.getElementById('bookData').textContent);
const pages = data.pages;
const chapterPageMap = data.chapterPageMap;
let index = 0;
let fontScale = 1;
const book = document.getElementById('book');
const pageCount = document.getElementById('pageCount');
const progressFill = document.getElementById('progressFill');
const sidebar = document.getElementById('sidebar');

function isMobile() { return matchMedia('(max-width: 760px)').matches; }
function clampIndex(i) {
  const max = pages.length - 1;
  i = Math.max(0, Math.min(max, i));
  if (isMobile() && i === 0 && pages.length > 1) i = 1;
  if (!isMobile() && i % 2 === 1) i -= 1;
  return i;
}
function pageHtml(page, pos, n) {
  if (!page) page = { kind: 'blank', title: '', html: '<div class="blank-mark"></div>' };
  const printedPage = page.kind === 'blank' ? '' : Math.max(1, n);
  const tocReturn = !['blank', 'image-cover', 'cover', 'prologue', 'toc', 'colophon'].includes(page.kind)
    ? '<button class="page-toc-return" data-toc-return>목차</button>' : '';
  return `<article class="page ${pos} ${isMobile() ? 'mobile-active' : ''}" data-kind="${page.kind}">
    ${tocReturn}
    <div class="page-inner">${page.html}</div>
    <div class="scroll-indicator"><div class="scroll-thumb"></div></div>
    <div class="page-number">${printedPage}</div>
  </article>`;
}
function updateTocNumbers() {
  document.querySelectorAll('.toc-row').forEach(btn => {
    const target = btn.dataset.goto;
    const n = chapterPageMap[target];
    const el = btn.querySelector('.toc-page-num');
    if (el && Number.isFinite(n)) el.textContent = String(n + 1).padStart(2, '0');
  });
}
function render() {
  index = clampIndex(index);
  const mobile = isMobile();
  const left = pages[index];
  const right = mobile ? null : pages[index + 1];
  book.innerHTML = mobile
    ? pageHtml(left, 'right', index)
    : pageHtml(left, 'left', index) + pageHtml(right, 'right', index + 1);
  const totalReadable = Math.max(1, pages.length - 1);
  const readablePage = mobile ? index : Math.min(index + 1, totalReadable);
  pageCount.textContent = `${String(readablePage).padStart(2,'0')} / ${String(totalReadable).padStart(2,'0')}`;
  progressFill.style.width = `${totalReadable <= 1 ? 0 : ((readablePage - 1) / (totalReadable - 1)) * 100}%`;
  updateTocNumbers();
  book.querySelectorAll('[data-goto]').forEach(btn => btn.addEventListener('click', () => goToChapter(btn.dataset.goto)));
  book.querySelectorAll('[data-toc-return]').forEach(btn => btn.addEventListener('click', () => goToPage(4)));
  book.querySelectorAll('.page').forEach(page => {
    const inner = page.querySelector('.page-inner');
    const thumb = page.querySelector('.scroll-thumb');
    if (!inner || !thumb) return;
    const updateScrollThumb = () => {
      const overflow = inner.scrollHeight - inner.clientHeight;
      page.classList.toggle('has-scroll', overflow > 12);
      if (overflow <= 12) return;
      const track = page.querySelector('.scroll-indicator');
      const trackHeight = track.clientHeight;
      const thumbHeight = Math.max(42, Math.round((inner.clientHeight / inner.scrollHeight) * trackHeight));
      const top = Math.round((inner.scrollTop / overflow) * (trackHeight - thumbHeight));
      thumb.style.height = `${thumbHeight}px`;
      thumb.style.transform = `translateY(${top}px)`;
    };
    inner.addEventListener('scroll', updateScrollThumb);
    updateScrollThumb();
  });
}
const voiceBtn = document.getElementById('voiceBtn');
const speechSupported = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
let preferredVoice = null;
let ttsChunks = [];
let ttsCursor = 0;
let ttsActive = false;
let ttsStopping = false;

function loadPreferredVoice() {
  if (!speechSupported) return null;
  const voices = speechSynthesis.getVoices();
  const koVoices = voices.filter(voice =>
    /^ko[-_]?KR$/i.test(voice.lang || '') ||
    /korean|한국|대한민국|ko[-_]?kr/i.test(`${voice.name} ${voice.lang}`)
  );
  const maleHints = /(male|man|남성|yoon|yong|young|minho|jinho|seojun|injoon|민준|준서|지훈|현우|영호)/i;
  preferredVoice = koVoices.find(voice => maleHints.test(voice.name)) || koVoices[0] || voices.find(voice => /^ko/i.test(voice.lang || '')) || null;
  return preferredVoice;
}

function updateVoiceButton() {
  if (!voiceBtn) return;
  voiceBtn.textContent = ttsActive ? '중지' : '듣기';
  voiceBtn.classList.toggle('is-reading', ttsActive);
  voiceBtn.setAttribute('aria-label', ttsActive ? '음성 읽기 중지' : '현재 페이지 음성으로 듣기');
}

function getReadableTextFromCurrentPage() {
  const visiblePages = [...book.querySelectorAll(isMobile() ? '.page.mobile-active' : '.page')]
    .filter(page => !['blank', 'image-cover'].includes(page.dataset.kind));
  const text = visiblePages.map(page => {
    const clone = page.cloneNode(true);
    clone.querySelectorAll('button, .page-number, .scroll-indicator').forEach(el => el.remove());
    return clone.textContent || '';
  }).join(' ');
  return text
    .replace(/\s+/g, ' ')
    .replace(/[‹›]/g, '')
    .trim();
}

function makeSpeechChunks(text) {
  const chunks = [];
  let current = '';
  text.split(/\s+/).forEach(word => {
    const next = current ? `${current} ${word}` : word;
    if (next.length > 150 && current) {
      chunks.push(current);
      current = word;
    } else {
      current = next;
    }
  });
  if (current) chunks.push(current);
  return chunks;
}

function finishReading() {
  ttsActive = false;
  ttsStopping = false;
  ttsChunks = [];
  ttsCursor = 0;
  updateVoiceButton();
}

function speakNextChunk() {
  if (!speechSupported || !ttsActive || ttsStopping) return;
  if (ttsCursor >= ttsChunks.length) {
    finishReading();
    return;
  }
  const utterance = new SpeechSynthesisUtterance(ttsChunks[ttsCursor]);
  ttsCursor += 1;
  utterance.lang = 'ko-KR';
  utterance.rate = 0.82;
  utterance.pitch = 0.78;
  utterance.volume = 1;
  utterance.voice = preferredVoice || loadPreferredVoice();
  utterance.onend = () => {
    if (!ttsStopping) speakNextChunk();
  };
  utterance.onerror = () => {
    if (!ttsStopping) finishReading();
  };
  speechSynthesis.speak(utterance);
}

function startReading() {
  if (!speechSupported) {
    alert('이 브라우저에서는 음성 읽기를 지원하지 않습니다. Safari 또는 Chrome 최신 버전에서 열어주세요.');
    return;
  }
  const text = getReadableTextFromCurrentPage();
  if (!text) {
    alert('현재 페이지에는 읽을 텍스트가 없습니다. 다음 페이지로 넘긴 뒤 다시 눌러주세요.');
    return;
  }
  loadPreferredVoice();
  ttsChunks = makeSpeechChunks(text);
  ttsCursor = 0;
  ttsActive = true;
  ttsStopping = false;
  updateVoiceButton();
  speechSynthesis.cancel();
  setTimeout(speakNextChunk, 80);
}

function stopReading() {
  if (!speechSupported) return;
  if (ttsActive || speechSynthesis.speaking || speechSynthesis.pending) {
    ttsStopping = true;
    speechSynthesis.cancel();
  }
  finishReading();
}

function toggleReading() {
  if (ttsActive) stopReading();
  else startReading();
}

function next() { stopReading(); index += isMobile() ? 1 : 2; render(); }
function prev() { stopReading(); index -= isMobile() ? 1 : 2; render(); }
function goToPage(n) { stopReading(); index = n; sidebar.classList.remove('open'); render(); }
function goToChapter(id) { goToPage(chapterPageMap[id] || 0); }

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key.toLowerCase() === 't') sidebar.classList.toggle('open');
});
document.getElementById('menuBtn').addEventListener('click', () => sidebar.classList.toggle('open'));
if (voiceBtn) {
  if (speechSupported) {
    loadPreferredVoice();
    speechSynthesis.onvoiceschanged = loadPreferredVoice;
    voiceBtn.addEventListener('click', toggleReading);
    addEventListener('beforeunload', () => speechSynthesis.cancel());
  } else {
    voiceBtn.disabled = true;
    voiceBtn.title = '이 브라우저에서는 음성 읽기를 지원하지 않습니다.';
  }
  updateVoiceButton();
}
document.getElementById('fontUp').addEventListener('click', () => {
  fontScale = Math.min(1.24, fontScale + .06);
  document.documentElement.style.setProperty('--scale', fontScale.toFixed(2));
});
document.getElementById('fontDown').addEventListener('click', () => {
  fontScale = Math.max(.88, fontScale - .06);
  document.documentElement.style.setProperty('--scale', fontScale.toFixed(2));
});
document.getElementById('themeBtn').addEventListener('click', () => {
  document.body.classList.toggle('light');
  document.body.classList.toggle('dark');
  const btn = document.getElementById('themeBtn');
  btn.textContent = document.body.classList.contains('light') ? '☾' : '☀';
});
const fullscreenBtn = document.getElementById('fullscreenBtn');
function getFullscreenElement() {
  return document.fullscreenElement || document.webkitFullscreenElement;
}
function updateFullscreenButton() {
  if (!fullscreenBtn) return;
  const active = !!getFullscreenElement();
  fullscreenBtn.textContent = active ? '⛌' : '⛶';
  fullscreenBtn.setAttribute('aria-label', active ? '전체화면 종료' : '전체화면');
}
async function toggleFullscreen() {
  const root = document.documentElement;
  try {
    if (getFullscreenElement()) {
      if (document.exitFullscreen) await document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else if (root.requestFullscreen) {
      await root.requestFullscreen();
    } else if (root.webkitRequestFullscreen) {
      root.webkitRequestFullscreen();
    } else {
      alert('이 브라우저에서는 전체화면을 지원하지 않습니다. 모바일에서는 브라우저 메뉴에서 홈 화면에 추가한 뒤 열어주세요.');
    }
  } catch (error) {
    alert('브라우저가 전체화면 전환을 막았습니다. 주소창 오른쪽이나 브라우저 메뉴의 전체화면 기능을 사용해주세요.');
  } finally {
    updateFullscreenButton();
  }
}
if (fullscreenBtn) {
  fullscreenBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', updateFullscreenButton);
  document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
  updateFullscreenButton();
}
const sideLinks = document.getElementById('sideLinks');
sideLinks.innerHTML = pages.filter(p => p.chapterStart)
  .map(p => `<button class="side-link" data-goto="${p.chapterId}">${p.title.replace(/^\d+\.\s*/, '')}</button>`).join('');
sideLinks.querySelectorAll('[data-goto]').forEach(btn => btn.addEventListener('click', () => goToChapter(btn.dataset.goto)));
addEventListener('resize', () => {
  stopReading();
  render();
});
render();
</script>
