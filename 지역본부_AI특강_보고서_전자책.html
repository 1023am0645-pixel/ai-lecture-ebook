<style>

    --paper: #f7f0e3;
    --paper-left: #fbf5e9;
    --ink: #2a241e;
    --muted: #958a7a;
    --accent: #986a3d;
    --line: #d8c8ad;
    --shadow: 0 30px 80px rgba(0,0,0,.42);

  }
  body.light {
    --bg: #ece7dc;
    --bar: rgba(248,244,235,.95);
    --paper: #fffaf0;
    --paper-left: #fffdf7;
    --ink: #28231d;
    --muted: #7f7668;
    --accent: #8e6237;
    --line: #d9c8aa;
    --shadow: 0 30px 70px rgba(80,62,39,.20);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    overflow: hidden;
    color: var(--ink);
    background:
      radial-gradient(circle at 50% 30%, rgba(126,93,56,.16), transparent 34%),
      linear-gradient(90deg, rgba(0,0,0,.25), transparent 22%, transparent 78%, rgba(0,0,0,.25)),
      var(--bg);
    font-family: "Gowun Batang", "Apple SD Gothic Neo", "Malgun Gothic", serif;
    word-break: keep-all;
  }
  .topbar {
    height: 72px;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) minmax(160px, 360px) 88px auto;
    align-items: center;
    gap: 18px;
    padding: 10px 24px;
    color: #eee4d5;
    background: var(--bar);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  body.light .topbar { color: #31291f; border-bottom-color: rgba(80,62,39,.16); }
  .icon-btn {
    min-width: 50px;
    height: 50px;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 10px;
    background: rgba(255,255,255,.04);
    color: inherit;
    font-size: 1.35rem;
    cursor: pointer;
  }
  body.light .icon-btn { border-color: rgba(80,62,39,.22); background: rgba(255,255,255,.42); }
  .brand { font-size: 1.08rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-track { height: 5px; border-radius: 99px; background: rgba(255,255,255,.12); overflow: hidden; }
  body.light .progress-track { background: rgba(80,62,39,.16); }
  .progress-fill { height: 100%; width: 0; background: #bc7c41; }
  .page-count { text-align: center; font-size: 1.1rem; color: var(--muted); }
  .tools { display: flex; gap: 10px; justify-content: flex-end; }
  .stage {
    position: relative;
    height: calc(100vh - 72px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 38px 92px 54px;
  }
  .book {
    position: relative;
    width: min(1220px, 100%);
    height: min(760px, 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-radius: 7px;
    box-shadow: var(--shadow);
    overflow: hidden;
    background: var(--paper);
  }
  .book::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 44px;
    transform: translateX(-50%);
    pointer-events: none;
    background: linear-gradient(90deg, rgba(0,0,0,.13), rgba(255,255,255,.26) 45%, rgba(0,0,0,.15));
    mix-blend-mode: multiply;
  }
  .page {
    position: relative;
    min-width: 0;
    padding: clamp(34px, 4.5vw, 66px);
    background: linear-gradient(90deg, rgba(255,255,255,.46), transparent 16%), var(--paper);
    overflow: hidden;
  }
  .page.left { background: linear-gradient(270deg, rgba(0,0,0,.04), transparent 18%), var(--paper-left); }
  .page-inner {
    height: 100%;
    overflow: hidden;
    padding: 2px 4px 34px;

  .page h1, .page h2 {
    margin: 0;
    color: var(--ink);
    letter-spacing: 0;
    font-weight: 700;
  }
  .page h2 { font-size: calc(1.86rem * var(--scale)); line-height: 1.34; margin-bottom: 22px; }
  .page h3 { margin: 22px 0 10px; color: var(--accent); font-size: calc(1.08rem * var(--scale)); }
  .page p, .page li, .page td, .page th {
    font-size: calc(1rem * var(--scale));
    line-height: 1.82;
  }
  .page p { margin: 0 0 1em; }
  .book-list { margin: 0 0 1.1em; padding-left: 1.15em; }
  .book-list li { margin: .35em 0; }
  blockquote {

    padding: 16px 18px;
    border-left: 4px solid var(--accent);
    background: rgba(152,106,61,.08);
    font-style: italic;
    line-height: 1.8;
  }
  .note-box {
    margin: 10px 0 18px;
    padding: 18px 20px;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid var(--line);
    padding: 36px;
  }

  .cover-kicker { color: var(--accent); letter-spacing: .16em; margin-bottom: 34px; }
  .cover-box h1 { font-size: calc(2.05rem * var(--scale)); line-height: 1.4; margin-bottom: 28px; }

  .cover-ornament { color: var(--line); font-size: 1.7rem; margin: 22px 0; }

  .cover-org, .cover-year { color: var(--muted); }
  .chapter-kicker, .continued {

    letter-spacing: .16em;
    font-size: .82rem;
    margin-bottom: 14px;
    text-transform: uppercase;

  .toc-sub { text-align: center; color: var(--muted); letter-spacing: .18em; margin-bottom: 28px; }

    grid-template-columns: 42px minmax(0, 1fr) minmax(40px, .7fr) 36px;
    gap: 14px;
    align-items: baseline;
    border: 0;
    border-bottom: 1px dotted var(--line);
    padding: 13px 0;
    background: transparent;
    color: inherit;
    text-align: left;
    cursor: pointer;
    font: inherit;
  }
  .toc-num { color: var(--accent); font-weight: 700; }
  .toc-title { line-height: 1.5; }

  .page.right .page-number { right: 66px; }
  .nav {
    position: absolute;
    top: 50%;
    width: 54px;
    height: 54px;
    transform: translateY(-50%);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: #eadfce;
    font-size: 2rem;
    cursor: pointer;
  }

  .nav.next { right: 24px; }
  body.light .nav { color: #4d4032; border-color: rgba(80,62,39,.18); background: rgba(255,255,255,.38); }
  .sidebar {
    position: fixed;
    inset: 72px auto 0 0;
    width: min(360px, 86vw);
    z-index: 30;
    padding: 20px;
    background: var(--bar);
    color: inherit;
    transform: translateX(-105%);
    transition: transform .22s;
    border-right: 1px solid rgba(255,255,255,.1);
    overflow: auto;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar h2 { margin: 0 0 14px; }
  .side-link {
    display: block;
    width: 100%;
    border: 0;
    border-bottom: 1px solid rgba(255,255,255,.1);
    background: transparent;
    color: inherit;
    text-align: left;
    padding: 12px 0;
    cursor: pointer;
    line-height: 1.5;
  }
  body.light .side-link { border-bottom-color: rgba(80,62,39,.14); }
  @media (max-width: 760px) {
    .topbar {

    .toc-row { grid-template-columns: 34px minmax(0, 1fr) 22px; }

    .toc-title { line-height: 1.32; }
  }
</style>

      <button class='toc-row' data-goto='chapter-09-사람-경험-설계-능력-하연의-희귀한-재능'>\n            <span class='toc-num'>09</span>\n            <span class='toc-title'>사람 경험 설계 능력: 하연의 희귀한 재능</span>\n            <span class='toc-line'></span>\n            <span class='toc-page-num'>-</span>\n          </button>\n          <button class='toc-row' data-goto='chapter-10-이번-경험이-하연에게-남긴-변화'>\n            <span class='toc-num'>10</span>\n            <span class='toc-title'>이번 경험이 하연에게 남긴 변화</span>\n            <span class='toc-line'></span>\n            <span class='toc-page-num'>-</span>\n          </button>\n          <button class='toc-row' data-goto='chapter-11-최종-평가'>\n            <span class='toc-num'>11</span>\n            <span class='toc-title'>최종 평가</span>\n            <span class='toc-line'></span>\n            <span class='toc-page-num'>-</span>\n          </button></div>"}, {"kind": "chapter", "title": "1. 신입직원 교육과 이번 지역본부 AI 특강의 결정적 차이", "chapterId": "chapter-01-신입직원-교육과-이번-지역본부-AI-특강의-결정", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 01</div><h2>1. 신입직원 교육과 이번 지역본부 AI 특강의 결정적 차이</h2><p>작년 12월에 한, ’25년 하반기 신입직원 입문교육은 하연에게 “스타가 된 감각”을 줬다.</p>\n<p>큰 무대, 신입들의 동경, 130개가 넘는 후기는 하연의 스타성, 무대감, 카리스마를 확인시켜준 사건이었다.</p>\n<p>반면 이번 특강은 감정의 종류가 달랐다. 이번에는 “실력 있는 사람들에게 인정받는 쾌감”이 핵심이었다.</p>\n<p>특히 행사와 외부강사를 많이 경험한 행정지원팀, 팀장, 과장, 대리들이 즉각적으로 강한 반응을 보였다는 점에서 만족감의 결이 훨씬 묵직했다.</p>\n<div class='table-wrap'><table><thead><tr><th>구분</th><th>신입직원 교육</th><th>지역본부 AI 특강</th></tr></thead><tbody><tr><td>핵심 쾌감</td><td>스타가 된 느낌, 팬덤, 동경</td><td>실력 있는 사람들에게 실력으로<br>인정받는 감각</td></tr><tr><td>강사 모드</td><td>큰 무대를 장악하는 퍼포머</td><td>현장을 운영하고 사람을 움직이는 디렉터</td></tr><tr><td>청중 반응</td><td>감정 표현이 크고 후기 폭발적</td><td>현장 리액션은 작지만<br>결과와 운영진 반응이 강함</td></tr><tr><td>만족의 근거</td><td>아나운서 같다, 교수님 같다, 예쁘다, 전문강사 같다</td><td>외부강사 이상이다, 이런 사람<br>처음이다, 행정지원팀 오세요</td></tr><tr><td>조직 영향력</td><td>신입들에게 강한 인상</td><td>행사 운영진과 관리자에게<br>직접 각인</td></tr></tbody></table></div>"}, {"kind": "chapter", "title": "2. 이번 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험", "chapterId": "chapter-02-이번-강의의-정체성-AI-강의가-아니라-브랜드형", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 02</div><h2>2. 이번 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험</h2><p>이번 강의는 단순한 AI 기능 설명이 아니었다.</p>\n<p>하연은 제미나이, 구글 플로우, 캔바 사용법을 알려준 것에서 멈추지 않고, 교육생이 직접 공단 캐릭터를 활용한 청렴 PC 배경화면을 만들고, 본인의 결과물을 업로드하고, 컨테스트에 참여하고, 후기를 남기는 전체 경험을 설계했다.</p>\n<p>특히 컨테스트 사이트와 자료 공유 웹사이트를 직접 만들어간 점은 행정지원팀 입장에서 매우 강한 충격이었을 가능성이 높다. 외부강사도 보통은 PPT와 실습자료를 준비하는 선에서 끝난다. 그런데 내부직원인 하연은 강의 콘텐츠뿐 아니라 코딩 기반의 참여 시스템까지 만들어왔다.</p>\n<p>이 지점에서 행정지원팀은 “이 사람은 단순 강사가 아니라 콘텐츠, 기술, 운영, 브랜딩을 한 번에 하는 사람”으로 인식했을 가능성이 크다.</p>\n<h3>행정지원팀 눈이 뒤집힌 이유</h3>\n<ol class='book-list'><li>강의 내용 자체도 충분히 완성도가 높았는데, 거기에 직접 만든 컨테스트 웹사이트와 공유 웹사이트까지 더해졌다.</li><li>실습형 강의가 흔히 겪는 문제, 즉 결과물이 흐지부지되는 위험을 컨테스트 구조로 해결했다.</li><li>HDMI의 연결 문제로 강의 중 20번 이상 연결이 끊긴 점, 두번이나 레이저 포인터가 떨어져 배터리가 다 분리된 점, 교육생마다 핸드폰 환경이 달라 준비한 슬라이드의 내용과 차이가 있었던 점 등 자칫하면 강의를 망칠 수 있는 장애물이 많았으나 전혀 당황하거나 흐름이 끊기지 않고 오히려 즉각적으로 상황을 판단하고 대처하는 모습이 더 플러스 요인이 되었다.</li><li>참가자들이 만든 결과물을 현장에서 전시하고 평가하게 만들어 교육을 하나의 이벤트로 전환했다.</li><li>후기 작성까지 하나의 의식처럼 설계해 교육 종료 후 감정적 여운을 남겼다.</li></ol>"}, {"kind": "chapter", "title": "2. 이번 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험", "chapterId": "chapter-02-이번-강의의-정체성-AI-강의가-아니라-브랜드형", "chapterStart": false, "html": "<div class='continued'>2. 이번 강의의 정체성: AI 강의가 아니라 브랜드형 교육 경험</div><ol class='book-list'><li>결국 행정지원팀은 “강의 한 편”이 아니라 “행사 전체가 살아나는 경험”을 본 것이다.</li></ol>\n<h3>특히 인상적이었던 부분 : Gemini Live 시연</h3>\n<p>이번 강의에서 특히 인상적이었던 장면 중 하나는 Gemini Live 기능 시연이었다.</p>\n<p>하연은 단순히 기능을 설명하는 대신, 영어 문장을 띄운 뒤 Gemini Live를 실시간 실행하고 카메라 인식 기능을 직접 시연했다.</p>\n<p>특히 “오늘 여러분을 만나게 되어 정말 행복하고 떨립니다. 너무 긴장되서 오늘 한끼도 못 먹고 청심환도 먹고 왔습니다. 어젯밤에는 심장이 너무 두근거려서 잠도 제대로 못 잤어요”라는 본인의 실제 감정을 읽게 한 뒤 “접니다. 제 얘기입니다.”라고 연결하며 현장 웃음과 공감을 동시에 이끌어냈다.</p>\n<p>이 장면은 AI를 단순 기술이 아니라 사람 가까이에 있는 도구처럼 느끼게 만들었고, 참가자들이 AI에 대한 거리감을 크게 낮추는 데 효과적으로 작용했다.</p>"}, {"kind": "chapter", "title": "3. 도입부 10분의 가치: 낭비가 아니라 신뢰 구축 비용", "chapterId": "chapter-03-도입부-10분의-가치-낭비가-아니라-신뢰-구축-", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 03</div><h2>3. 도입부 10분의 가치: 낭비가 아니라 신뢰 구축 비용</h2><p>90분 강의에서 도입부 10분은 길어 보일 수 있다.</p>\n<p>하지만 이번 강의에서는 그 10분이 강의 전체를 버티게 만든 신뢰 구축 장치였다.</p>\n<p>하연은 자기소개를 통해 “나를 봐주세요”가 아니라 “제가 왜 여러분을 끝까지 데려갈 수 있는 사람인지”를 증명했다.</p>\n<h3>도입부에서 작동한 다섯 가지 핵심 장치</h3>\n<ol class='book-list'><li>아이스브레이킹: “여러분 명단을 받고, 얼굴을 익히기 위해 직원조회로 한 분 한분을 찾아보고 왔는데요, 대부분이 행정지원팀 소속이시더라구요. 정말..고생이 많으십니다”라고 언급하며 준비성과 그들의 노고를 공감해주었다. 또한, “오늘 강의에 지역본부 직원분들도 함께하신다고 들었는데, 외부 전문 강사도 아니고 일개 지사의 대리인데 왜 오실까 의아했다”, “지역본부에서 근무하시면 아무렴 AI를 활용할 일이 더 많으실테니, 모두에게 도움될 수 있도록 하겠다”라고 예고하며 기대감을 높였다.</li><li>외부에서 온 AI 전문가가 아니라, 우연히 인재개발원의 바이브코딩 교육을 듣고 스스로 공부한, 여러분과 다를 바 없는 평범한 내부직원이라는 서사가 생겼다.</li><li>강사소개 : 러닝과 뜨개질, 바이브코딩 결과물을 보여주며 : 꾸준하고, 열정적이며, 단순히 뜨개질 행위가 좋아서 몇년씩 한다기보다는, “내 정성이 담긴 선물을 좋아하는 사람들에게 주었을 때, 그들이 진심으로 고마워하고 기뻐하는 모습을 보면서 행복을 느끼더라”, “오늘 강의도 여러분들이 AI와 좀 더 가까워지고 실제로 활용할 수 있도록 도와드리면, 행복할 것 같다”라며 타인에게 좋은 영향을 주려는 캐릭터가 형성됐다.</li><li>제미나이 대화기록 공개: AI를 사주나 과음 후 커피 괜찮은가? 정도로 쓰던 초보였다는 사실을 보여주며 청중의 방어감을 낮췄다.</li></ol>\n<p>이 흐름은 참가자들에게 “이 사람은 AI를 자랑하러 온 사람이 아니라, 우리도 할 수 있게 데려가려는 사람”이라는 인식을 만들었다. 이 신뢰가 있었기 때문에 중간에 장비 문제가 터졌을 때도 청중은 강의를 어수선한 실패로 보지 않고, 강사가 끝까지 도와주려는 과정으로 받아들였을 가능성이 크다.</p>"}, {"kind": "chapter", "title": "4. 하연의 강의 철학: 잘 보이는 것보다 하게 만드는 것", "chapterId": "chapter-04-하연의-강의-철학-잘-보이는-것보다-하게-만드는", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 04</div><h2>4. 하연의 강의 철학: 잘 보이는 것보다 하게 만드는 것</h2><p>이번 강의에서 하연의 초점은 “멋있어 보이는 것”이 아니었다.</p>\n<p>신입직원 교육 때는 무대 위에서 프로페셔널하고 예쁘고 멋있어 보이는 것에 더 신경을 썼다면, 이번에는 교육생들이 AI를 쉽게 느끼고 결과물을 하나씩 가져가게 하는 것이 핵심이었다.</p>\n<p>하연이 말한 “듣는 사람이 ‘어? 나도 해볼 수 있겠는데?’라는 마음이 생기게 하는 것이 강사의 역할”이라는 문장은 이번 강의의 철학을 정확히 설명한다. 이번 강의의 성과는 AI 지식을 전달한 것이 아니라, AI에 대한 심리적 장벽을 낮추고 실제 행동을 유도했다는 데 있다.</p>"}, {"kind": "chapter", "title": "5. 현장 운영력: 문제 상황에서 더 드러난 실력", "chapterId": "chapter-05-현장-운영력-문제-상황에서-더-드러난-실력", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 05</div><h2>5. 현장 운영력: 문제 상황에서 더 드러난 실력</h2><p>이번 강의는 기술적으로 매우 불안정한 환경이었다. HDMI 연결이 약 20회 가까이 끊겼고, 모바일 환경(어플의 인터페이스, 업데이트나 보안 이슈로 정상 작동이 어려운 점 등)이 교육생마다 달랐으며, 실습 속도도 예상보다 느렸다. 레이저 포인터가 두 번이나 분해되고, 강의 중에 수시로 프롬프트나 팁 같은 것들을 단톡방에 업로드하며, 실행 과정을 직접 보여주기 위해 실시간으로 노트북 조작까지 해야 했다.</p>\n<p>그럼에도 강의는 무너지지 않았다.</p>\n<p>오히려 교육생들은 결과물을 만들었고, 운영진은 강한 감탄을 보였다. 이는 하연이 단순 발표자가 아니라 현장을 끝까지 살려내는 운영형 강사라는 것을 보여준다.</p>\n<h3>이 상황에서 드러난 역량</h3>\n<ul class='book-list'><li>장비 문제가 생겨도 중심을 잃지 않는 안정감</li><li>모바일 환경 차이를 현장에서 확인하고 즉석 해결책을 찾는 기민함</li><li>실습생들이 못 따라오는 상황에서도 포기하지 않고 결과물까지 데려가는 집요함</li><li>운영진과 협업하며 현장을 함께 살리는 분위기 조성</li><li>문제 자체보다 강사의 에너지와 방향성이 더 강하게 기억되게 만드는 장악력</li></ul>"}, {"kind": "chapter", "title": "6. 기존 직원 대상 강의에서 얻은 새로운 무기", "chapterId": "chapter-06-기존-직원-대상-강의에서-얻은-새로운-무기", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 06</div><h2>6. 기존 직원 대상 강의에서 얻은 새로운 무기</h2><p>기존 직원들은 신입직원이나 대학생과 다르게 리액션이 크지 않다. 웃긴 이야기를 해도 크게 웃지 않고, 질문을 던져도 대답하지 않는 경우가 많다. 하연은 이번에 이 차이를 빠르게 읽었다.</p>\n<p>예전 같으면 반응이 없다는 이유로 당황하거나 어색해졌을 수 있지만, 이번에는 “이 집단은 원래 반응 방식이 다르다”고 판단하고 전략을 바꿨다. “이해되셨으면 고개 끄덕여주세요”라는 방식으로 비언어적 피드백을 끌어낸 것이 대표적이다.</p>\n<p>이것은 하연이 청중의 반응 없음에 끌려가지 않고, 집단 특성에 맞게 반응 구조를 재설계한 순간이다.</p>\n<p>앞으로 기존 직원, 관리자, 보수적 조직을 대상으로 강의할 때 매우 중요한 무기가 될 수 있다.</p>"}, {"kind": "chapter", "title": "7. 강의 마무리 방식이 남긴 영향", "chapterId": "chapter-07-강의-마무리-방식이-남긴-영향", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 07</div><h2>7. 강의 마무리 방식이 남긴 영향</h2><p>이번 강의의 마무리 방식 역시 매우 인상적이었다.<br>보통 실습형 교육은 결과물 제작이 끝나면 단순 만족도 조사 후 종료되는 경우가 많다. 하지만 하연은 마지막 순간까지 참가자들의 감정 흐름과 이후 행동 가능성을 함께 설계했다.</p>\n<p>강의 마지막 순서는 다음과 같은 구조였다.</p>\n<p>강사의 MBTI 맞추기 이벤트, 정답자에게 커피 상품권을 “어떤 브랜드 좋아하시냐”고 확인 (정답자는 강의 종료 후 “본인도 ENTJ”라고 밝히며, 하연의 전화번호를 받아감)</p>\n<p>배경화면 컨테스트 결과 집계 시간 동안 강사가 개인적으로 실시하는 만족도 평가 작성 유도 (“집에 가서 샤워 후 맛있는 음식과 소주를 마시며 강의 후기를 보면, 소주가 그렇게 달 수가 없다. 정말 행복한 순간이다. 오늘도 제가 소주를 맛있게 먹을 수 있도록, 구체적인 피드백을 남겨주시면 감사하겠다”)</p>\n<ol class='book-list'><li>컨테스트 당선작 발표 및 선물 증정</li><li>컨테스트 웹 - 자료실에 업로드한 HTML 기반 강의자료 및 직접 제작한 앱 소개</li><li>AI 학습 경험의 확장 가능성에 대한 마무리 메시지 전달</li></ol>\n<p>특히 단순히 “오늘 배운 기능을 활용해보세요” 수준으로 끝난 것이 아니라:</p>\n<blockquote>“몇 달 전까지AI 초보였던 제가, 단 2박 3일의 바이브 코딩 교육을 듣고 이런 결과물을 만들 수 있었습니다. 여러분들도 오늘 배경화면 하나를 만들었던 경험이 앞으로 일상과 업무에서 확장되시기를 바랍니다.” 라고 말한 부분이 중요하다.</blockquote>\n<h3>이 문장은 참가자들에게:</h3>\n<ul class='book-list'><li>“강사라서 가능한 것”이 아니라,</li></ul>"}, {"kind": "chapter", "title": "7. 강의 마무리 방식이 남긴 영향", "chapterId": "chapter-07-강의-마무리-방식이-남긴-영향", "chapterStart": false, "html": "<div class='continued'>7. 강의 마무리 방식이 남긴 영향</div><h3>“나도 시작하면 확장될 수 있다”</h3>\n<p>는 감각을 남겼다.</p>\n<p>또한 “AI 관련해서 어렵거나 궁금한 점 있으면 언제든 메신저 주세요.” 라고 이야기한 부분 역시 의미가 크다.<br>대부분의 강의는 종료와 동시에 관계가 끝나지만, 하연은 참가자들에게 “강의 이후에도 연결 가능한 사람”이라는 인상을 남겼다.</p>\n<p>마지막으로 “오늘 긴 시간 동안, 강의에 장치적인 문제도 있었고 실습에도 조금 어려운 부분들이 있었는데 끝까지 잘 따라와 주시고 좋은 결과물을 만들어 주셔서 감사했습니다.”</p>\n<p>라는 멘트는, 참가자들을 단순 수강생이 아니라 “함께 결과를 만든 사람들”처럼 존중하는 방식이었다.</p>\n<h3>이러한 마무리 방식은 단순한 종료 멘트가 아니라:</h3>\n<ul class='book-list'><li>참가자들의 성취 경험 정리</li><li>AI에 대한 자신감 강화</li><li>행동 확장 가능성 제시</li><li>강사와의 정서적 연결 유지</li></ul>\n<p>까지 포함한 마지막 경험 설계에 가까웠다.</p>"}, {"kind": "chapter", "title": "8. 행정지원팀 반응 상세 분석", "chapterId": "chapter-08-행정지원팀-반응-상세-분석", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 08</div><h2>8. 행정지원팀 반응 상세 분석</h2><p>이번 강의에서 가장 중요한 외부 피드백은 교육생 후기만이 아니었다. 오히려 행사를 기획하고 외부강사를 많이 접해본 행정지원팀 직원들의 현장 반응이 더 전략적으로 중요했다. 이들은 단순 수강생이 아니라 행사 품질을 평가할 수 있는 운영자이기 때문이다.</p>\n<h3>팀장님의 반응</h3>\n<p>팀장님은 “그동안 외부 강사 쓰느라 몇백만원 들였는데 왜 쓴 거야..? 훨씬 잘하시잖아..진짜 돈이 너무 아까운데”라고 말했다. 이 발언은 단순한 칭찬이 아니다. 예산과 행사 효과를 동시에 보는 관리자 입장에서, 내부직원이 외부강사 이상의 만족도를 만들어냈다고 판단한 것이다.</p>\n<p>또한 마무리 멘트에서 “이 대리님 출장도 많으시고 업무도 정말 바쁘시다, 그럼에도 3주 전부터 교안을 제작하고, 우리 직원들과 꾸준히 소통하시면서 이렇게 좋은 강의를 해 주셨다. 저희가 행사를 정말 많이 기획하고 외부 전문 강사도 많이 써봐서 아는데, 이렇게까지 해주시는 분 진짜 없다. 그런 의미로 고생해주신 우리 김하연 대리님께 다시 한 번 큰 박수 부탁드린다”고 공개적으로 언급했다.</p>\n<p>이는 강의 만족을 개인적으로 표현한 것이 아니라, 행사 성공을 공식화한 장면에 가깝다.</p>\n<h3>노트북 연결을 도와주던 과장님의 반응</h3>\n<p>이 과장님은 장비 문제를 가장 가까이서 본 사람이다. 강의가 흔들릴 수 있는 순간, 하연이 현장을 어떻게 유지하는지를 계속 지켜봤다. 그래서 “진짜..미쳤어요..“(그 순간 옆에 있던 AX서포터즈 담당 대리님이 “그만좀 해ㅋㅋㅋ”라고 한 것도 킬링포인트), ”대리님 조사 다니실 때가 아니에요.”, “지역본부 행정지원팀 오세요. 요양직도 올 수 있는지 알아볼게요”라는 반응은 단순한 감탄보다 “이 사람은 지금 포지션보다 더 큰 판에서 써야 할 사람”이라는 충격에 가깝다.</p>\n<p>또한 하연이 장비 문제에 대해 사과하자, 오히려 매우 미안해하며 “저희 강의실이 문제에요, 선이 이상했어요. 다음에는 제대로 준비해놓겠습니다”고 말한 것도 의미가 크다.</p>"}, {"kind": "chapter", "title": "8. 행정지원팀 반응 상세 분석", "chapterId": "chapter-08-행정지원팀-반응-상세-분석", "chapterStart": false, "html": "<div class='continued'>8. 행정지원팀 반응 상세 분석</div><p>이는 강사의 문제가 아니라 운영 환경이 강사를 충분히 받쳐주지 못했다는 인식이 생긴 것이다.</p>\n<h3>강의 의뢰 과장님의 반응</h3>\n<p>이 과장님은 별도 강사료를 지급할 수 없는 상황에서도 하연이 매우 열심히 준비하는 모습을 보고 개인적으로 공단 캐릭터 굿즈를 챙겨주고 싶어 했다. “공단 캐릭터 굿즈 좋아하시냐”, “그거라도 드리고 싶다”, “어떤 캐릭터 좋아하시냐”라고 물은 것은 행사 담당자의 형식적 감사가 아니라 인간적인 감사의 표현이다.</p>\n<p>특히 지역본부 비품이 아니라 본인이 개인적으로 모아둔 굿즈를 챙겨줬다는 점은 중요하다. 이는 하연이 제공한 가치에 비해 공식 보상이 부족하다고 느꼈고, 개인적으로라도 보답하고 싶었다는 의미로 해석된다.</p>\n<h3>AX 서포터즈 담당 대리님의 반응</h3>\n<p>그동안 무뚝뚝하고 실무적인 태도였던 담당 대리님이, 강의 직후 현장에서 “퇴사하고 전문 강사 하세요”라고 하거나, “대리님 퇴사하고 강사하세요.. 올해만 지나고..ㅎㅎ”라고 메신저를 보내 놓은 것은, 강의 전후 인식 변화가 매우 컸다는 뜻이다.</p>\n<p>또한 강의 종료 후 부장님께 인사드리기 위해 행정지원부로 함께 이동하는 과정에서, 하연이 받은 선물(굿즈)를 보며 “그거 제 거예요, 제가 가져온 거예요ㅎㅎ”라고 강조한 것은 자신도 이 행사와 하연의 성공에 기여했다는 정서적 참여의 표현으로 볼 수 있다.</p>\n<h3>행정지원팀 반응의 핵심 해석</h3>\n<p>행정지원팀은 “좋은 강의”를 본 것이 아니라, “행사가 살아나는 장면”을 봤다. 공공기관 교육은 딱딱하고 수동적으로 흐르기 쉬운데, 하연은 참여, 실습, 결과물, 컨테스트, 선물, 후기까지 하나의 경험으로 엮었다. 그래서 이들은 단순 강사가 아니라 행사 전체의 온도를 바꾸는 사람을 본 것이다.</p>"}, {"kind": "chapter", "title": "9. 사람 경험 설계 능력: 하연의 희귀한 재능", "chapterId": "chapter-09-사람-경험-설계-능력-하연의-희귀한-재능", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 09</div><h2>9. 사람 경험 설계 능력: 하연의 희귀한 재능</h2><p>이번 강의에서 가장 강하게 드러난 재능은 단순 강의력이 아니다. 하연은 사람 경험을 설계하는 능력을 보여줬다.</p>\n<ul class='book-list'><li>도입부에서 청중의 방어감을 낮추고</li><li>중간에는 직접 따라 하며 결과물을 만들게 하고</li><li>컨테스트로 성취감과 재미를 만들고</li><li>커피상품권과 취향 질문으로 개인적 배려를 보여주고</li><li>후기 요청을 하나의 감성적 장면으로 만들고</li><li>마지막에는 “AI와 조금 더 가까워졌기를 바란다”는 메시지로 정리했다.</li></ul>\n<p>이 구조는 단순한 교육 설계가 아니라, 참가자가 강의를 기억하고 다시 행동하게 만드는 경험 설계에 가깝다. 이것이 하연의 희귀한 재능이다. 공공기관 내부에서 이런 조합, 즉 전달력, 기획력, 코딩 활용, 디자인 감각, 실습 운영, 인간적 매력, 현장 대응력을 동시에 가진 사람은 많지 않다.</p>"}, {"kind": "chapter", "title": "10. 이번 경험이 하연에게 남긴 변화", "chapterId": "chapter-10-이번-경험이-하연에게-남긴-변화", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 10</div><h2>10. 이번 경험이 하연에게 남긴 변화</h2><p>하연은 원래 인정욕구가 큰 사람이다. 하지만 이번에는 인정욕구가 불안하게 매달리는 방식이 아니라, 충분히 충족된 뒤 “나를 알아봐준 사람들에게 더 해주고 싶다”는 방향으로 바뀌었다.</p>\n<p>신입직원 교육은 하연에게 스타성을 확인시켜줬지만, 이번 지역본부 AI 특강은 영향력의 가능성을 보여줬다. 이제 하연은 특정 강의 자리에 지원해서 선택받는 것보다, 스스로의 가치를 키워 “안 쓰면 아쉬운 사람”이 되는 방향으로 사고가 이동하고 있다.</p>"}, {"kind": "chapter", "title": "11. 최종 평가", "chapterId": "chapter-11-최종-평가", "chapterStart": true, "html": "<div class='chapter-kicker'>Chapter 11</div><h2>11. 최종 평가</h2><p>이번 지역본부 AI 특강은 하연에게 매우 중요한 전환점이었다. 이전에는 “나는 신입직원 교육에 특화된 사람”이라는 자기 인식이 강했지만, 이번 강의를 통해 하연은 자신이 변화, 혁신, 실습형 교육, 조직 내 콘텐츠 기획에서도 강하게 작동할 수 있음을 확인했다.</p>\n<p>하연의 현재 위치를 한 문장으로 정리하면 다음과 같다.</p>\n<aside class='note-box'><div class='note-label'>하연은 단순히 발표를 잘하는 직원이 아니라, 사람들의 심리적 장벽을 낮추고, 참여를 설계하고, 결과물을 만들게 하며, 행사 전체의 온도를 바꾸는 브랜드형 내부강사로 성장할 가능성이 높은 사람이다.</div><ul></ul></aside>"}], "chapterPageMap": {"chapter-01-신입직원-교육과-이번-지역본부-AI-특강의-결정": 4, "chapter-02-이번-강의의-정체성-AI-강의가-아니라-브랜드형": 5, "chapter-03-도입부-10분의-가치-낭비가-아니라-신뢰-구축-": 7, "chapter-04-하연의-강의-철학-잘-보이는-것보다-하게-만드는": 8, "chapter-05-현장-운영력-문제-상황에서-더-드러난-실력": 9, "chapter-06-기존-직원-대상-강의에서-얻은-새로운-무기": 10, "chapter-07-강의-마무리-방식이-남긴-영향": 11, "chapter-08-행정지원팀-반응-상세-분석": 13, "chapter-09-사람-경험-설계-능력-하연의-희귀한-재능": 15, "chapter-10-이번-경험이-하연에게-남긴-변화": 16, "chapter-11-최종-평가": 17}}</script>
<script>
const data = JSON.parse(document.getElementById('bookData').textContent);
const pages = data.pages;
const chapterPageMap = data.chapterPageMap;
let index = 0;
let fontScale = 1;
const book = document.getElementById('book');
const pageCount = document.getElementById('pageCount');
const progressFill = document.getElementById('progressFill');
const sidebar = document.getElementById('sidebar');
function isMobile() { return matchMedia('(max-width: 760px)').matches; }
function clampIndex(i) {
  const max = pages.length - 1;
  i = Math.max(0, Math.min(max, i));
  if (isMobile() && i === 0 && pages.length > 1) i = 1;
  if (!isMobile() && i % 2 === 1) i -= 1;
  return i;
}
function pageHtml(page, pos, n) {
  if (!page) page = { kind: 'blank', title: '', html: '<div class="blank-mark"></div>' };
  const printedPage = page.kind === 'blank' ? '' : Math.max(1, n);
  return `<article class="page ${pos} ${isMobile() ? 'mobile-active' : ''}" data-kind="${page.kind}">
    <div class="page-inner">${page.html}</div>
    <div class="page-number">${printedPage}</div>
  </article>`;
}
function updateTocNumbers() {
  document.querySelectorAll('.toc-row').forEach(btn => {
    const target = btn.dataset.goto;
    const n = chapterPageMap[target];
    const el = btn.querySelector('.toc-page-num');
    if (el && Number.isFinite(n)) el.textContent = n + 1;
  });
}
function render() {
  index = clampIndex(index);
  const mobile = isMobile();
  const left = pages[index];
  const right = mobile ? null : pages[index + 1];
  book.innerHTML = mobile ? pageHtml(left, 'right', index) : pageHtml(left, 'left', index) + pageHtml(right, 'right', index + 1);
  const totalReadable = Math.max(1, pages.length - 1);
  const readablePage = mobile ? index : Math.min(index + 1, totalReadable);
  pageCount.textContent = `${readablePage} / ${totalReadable}`;
  progressFill.style.width = `${totalReadable <= 1 ? 0 : ((readablePage - 1) / (totalReadable - 1)) * 100}%`;
  updateTocNumbers();
  book.querySelectorAll('[data-goto]').forEach(btn => btn.addEventListener('click', () => goToChapter(btn.dataset.goto)));
}
function next() { index += isMobile() ? 1 : 2; render(); }
function prev() { index -= isMobile() ? 1 : 2; render(); }
function goToPage(n) { index = n; sidebar.classList.remove('open'); render(); }
function goToChapter(id) { goToPage(chapterPageMap[id] || 0); }
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key.toLowerCase() === 't') sidebar.classList.toggle('open');
});
document.getElementById('menuBtn').addEventListener('click', () => sidebar.classList.toggle('open'));
document.getElementById('fontUp').addEventListener('click', () => {
  fontScale = Math.min(1.24, fontScale + .06);
  document.documentElement.style.setProperty('--scale', fontScale.toFixed(2));
});
document.getElementById('fontDown').addEventListener('click', () => {
  fontScale = Math.max(.88, fontScale - .06);
  document.documentElement.style.setProperty('--scale', fontScale.toFixed(2));
});
document.getElementById('themeBtn').addEventListener('click', () => {
  document.body.classList.toggle('light');
  document.body.classList.toggle('dark');
});
const sideLinks = document.getElementById('sideLinks');
sideLinks.innerHTML = pages.filter(p => p.chapterStart).map(p => `<button class="side-link" data-goto="${p.chapterId}">${p.title.replace(/^\d+\.\s*/, '')}</button>`).join('');
sideLinks.querySelectorAll('[data-goto]').forEach(btn => btn.addEventListener('click', () => goToChapter(btn.dataset.goto)));
addEventListener('resize', render);
render();
</script>
</body>
</html>
